<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>โค้ด → โฟลว์ชาร์ต</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/11.12.0/mermaid.min.js"></script>
<style>
  :root{
    --bg: #0b1220;
    --panel: #111a2e;
    --panel-2: #0e1626;
    --line: #24314d;
    --text: #e7ecf6;
    --dim: #8b98b8;
    --accent: #5fa8ff;
    --accent-2: #ffb454;
    --good: #4ade80;
    --bad: #f87171;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: "Inter", -apple-system, "Segoe UI", sans-serif;
    --grid-dot: #1a2540;
  }
  html[data-theme="light"]{
    --bg: #f3f5fa;
    --panel: #ffffff;
    --panel-2: #eef1f7;
    --line: #d8deea;
    --text: #101828;
    --dim: #64708a;
    --accent: #2563eb;
    --accent-2: #d97706;
    --good: #16a34a;
    --bad: #dc2626;
    --grid-dot: #d8deea;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  .app{display:flex;flex-direction:column;height:100vh;}

  /* top bar */
  .topbar{
    display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap;
    background:var(--panel-2);border-bottom:1px solid var(--line);
  }
  .brand{font-weight:700;font-size:14px;letter-spacing:.3px;display:flex;align-items:center;gap:8px;margin-right:4px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .topbar .spacer{flex:1;}
  .divider{width:1px;height:22px;background:var(--line);margin:0 4px;}
  select, .btn{
    background:var(--panel);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#081020;border-color:var(--accent);font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);color:#081020;}
  .btn.active{border-color:var(--accent-2);color:var(--accent-2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  html,body,.topbar,.pane,.editor-pane,.preview-pane,#diagramHost,.zoom-controls,.mmd-drawer{transition:background-color .18s ease, color .18s ease, border-color .18s ease;}
  #themeToggle{display:flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;}
  #themeToggle svg{width:17px;height:17px;display:block;}

  .color-picker-wrap{position:relative;}
  .color-wheel-btn{
    width:34px;height:34px;padding:0;border-radius:50%;border:2px solid var(--panel);
    background:conic-gradient(from 0deg, #ff5252, #ffca28, #66bb6a, #29b6f6, #7c4dff, #ec407a, #ff5252);
    cursor:pointer;box-shadow:0 0 0 1px var(--line);
  }
  .color-wheel-btn:hover{box-shadow:0 0 0 1px var(--accent);}
  .color-popover{
    position:absolute;top:calc(100% + 8px);right:0;z-index:30;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px;width:236px;box-shadow:0 12px 28px rgba(0,0,0,.4);
    display:none;
  }
  .color-popover.open{display:block;}
  .color-popover .popover-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600;}
  .shape-color-row{
    display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--text);
  }
  .shape-color-row svg{flex-shrink:0;color:var(--dim);}
  .shape-color-row span{flex:1;line-height:1.3;}
  .shape-color-row input[type="color"]{
    width:26px;height:26px;padding:2px;flex-shrink:0;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-2);cursor:pointer;
  }
  .shape-color-row input[type="color"]::-webkit-color-swatch-wrapper{padding:0;}
  .shape-color-row input[type="color"]::-webkit-color-swatch{border:none;border-radius:3px;}
  .color-popover-footer{
    display:flex;justify-content:flex-end;border-top:1px solid var(--line);
    margin-top:6px;padding-top:8px;
  }

  /* main split */
  .main{flex:1;display:flex;min-height:0;}
  .pane{display:flex;flex-direction:column;min-width:0;}
  .editor-pane{width:42%;min-width:320px;border-right:1px solid var(--line);background:var(--panel-2);}
  .preview-pane{flex:1;position:relative;background:
      radial-gradient(circle at 1px 1px, var(--grid-dot) 1px, transparent 1px) 0 0/22px 22px, var(--bg);}

  .pane-head{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--dim);
    text-transform:uppercase;letter-spacing:.6px;font-weight:600;
  }
  .pane-head .status{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:none;letter-spacing:0;}
  .pane-head .status .led{width:7px;height:7px;border-radius:50%;background:var(--good);}
  .pane-head .status.err .led{background:var(--bad);}

  textarea{
    flex:1;resize:none;border:none;outline:none;background:transparent;color:var(--text);
    font-family:var(--mono);font-size:13.5px;line-height:1.65;padding:16px;tab-size:2;
  }
  textarea::placeholder{color:#4a577a;}

  .samples{
    display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--line);
  }
  .chip{
    background:var(--panel);border:1px solid var(--line);color:var(--dim);
    padding:5px 10px;border-radius:999px;font-size:11.5px;cursor:pointer;
  }
  .chip:hover{border-color:var(--accent-2);color:var(--accent-2);}

  #diagramHost{
    position:absolute;inset:0;overflow:hidden;
  }
  .center-wrap{
    height:100%;width:100%;display:flex;align-items:center;justify-content:center;
    box-sizing:border-box;
  }
  #diagramHost svg{max-width:none !important;}
  .transform-wrap{display:inline-block;transform-origin:center center;will-change:transform;}
  .transform-wrap svg{display:block;}

  #diagramHost.hand-mode{cursor:grab;}
  #diagramHost.hand-mode.panning{cursor:grabbing;user-select:none;}
  #diagramHost.hand-mode.panning *{user-select:none;}

  .zoom-controls button.active{background:var(--accent);color:#081020;}
  .zoom-controls{
    position:absolute;bottom:16px;right:16px;display:flex;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;
  }
  .zoom-controls button{
    width:30px;height:30px;border-radius:7px;border:none;background:transparent;color:var(--text);
    font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .zoom-controls button:hover{background:var(--line);}

  .error-box{
    max-width:560px;background:#2a1414;border:1px solid #7f2d2d;color:#fca5a5;
    border-radius:10px;padding:16px 18px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.6;
  }
  .error-box b{color:#fecaca;font-family:var(--sans);}

  .empty-hint{color:var(--dim);font-size:13px;text-align:center;max-width:300px;}

  /* generated mermaid drawer */
  .mmd-drawer{
    position:absolute;left:0;right:0;bottom:0;max-height:45%;
    background:var(--panel-2);border-top:1px solid var(--accent-2);
    display:flex;flex-direction:column;transform:translateY(100%);transition:transform .18s ease-out;
    box-shadow:0 -8px 24px rgba(0,0,0,.35);
  }
  .mmd-drawer.open{transform:translateY(0);}
  .mmd-drawer-head{
    display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
    border-bottom:1px solid var(--line);font-size:12px;color:var(--accent-2);font-weight:600;
  }
  .mmd-drawer-head .row{display:flex;gap:8px;align-items:center;}
  .mmd-drawer pre{
    margin:0;padding:14px 16px;overflow:auto;font-family:var(--mono);font-size:12.5px;
    color:#cfe0ff;line-height:1.6;white-space:pre-wrap;
  }
  .mini-btn{
    background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:6px;
    padding:3px 9px;font-size:11px;cursor:pointer;
  }
  .mini-btn:hover{color:var(--accent-2);border-color:var(--accent-2);}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media (max-width: 800px){
    .main{flex-direction:column;}
    .editor-pane{width:100%;border-right:none;border-bottom:1px solid var(--line);height:46%;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><span class="dot"></span> โค้ด → โฟลว์ชาร์ต</div>
    <div class="divider"></div>
    <select id="modeSelect">
      <option value="mermaid">โหมด: เขียน Mermaid โดยตรง</option>
      <option value="code">โหมด: แปลงจากซอร์สโค้ด (C/C++/Java/JS)</option>
    </select>
    <select id="direction">
      <option value="TD">บนลงล่าง (TD)</option>
      <option value="LR">ซ้ายไปขวา (LR)</option>
      <option value="BT">ล่างขึ้นบน (BT)</option>
      <option value="RL">ขวาไปซ้าย (RL)</option>
    </select>
    <input type="file" id="fileInput" accept=".c,.cpp,.cc,.cxx,.h,.hpp,.java,.js" style="display:none;">
    <button class="btn" id="btnOpenFile" title="เปิดไฟล์ .c / .cpp / .java / .js แล้วแปลงเป็นผังงานทันที">📂 เปิดไฟล์โค้ด</button>
    <div class="spacer"></div>
    <div class="color-picker-wrap" id="colorPickerWrap">
      <button class="color-wheel-btn" id="colorWheelBtn" title="ปรับสีตามชนิดสัญลักษณ์"></button>
      <div class="color-popover" id="colorPopover">
        <div class="popover-label">สีตามชนิดสัญลักษณ์</div>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><rect x="1" y="1" width="30" height="16" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>เริ่มต้น/สิ้นสุด</span>
          <input type="color" id="clrStartEnd" value="#ffb84d" data-key="startEnd">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><line x1="2" y1="9" x2="30" y2="9" stroke="currentColor" stroke-width="2"/><polygon points="30,9 23,5 23,13" fill="currentColor"/></svg>
          <span>ลูกศรแสดงทิศทาง</span>
          <input type="color" id="clrArrow" value="#5fa8ff" data-key="arrow">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><rect x="1" y="1" width="30" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>ปฏิบัติงาน</span>
          <input type="color" id="clrProcess" value="#22c55e" data-key="process">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><path d="M1,6 L8,1 L31,1 L31,17 L1,17 Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>รับข้อมูล (Manual Input)</span>
          <input type="color" id="clrInput" value="#f2a9e0" data-key="input">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><polygon points="8,1 24,1 31,9 24,17 8,17 1,9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>เตรียมการ (Preparation)</span>
          <input type="color" id="clrPreparation" value="#facc15" data-key="preparation">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><rect x="1" y="1" width="30" height="16" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="1" x2="5" y2="17" stroke="currentColor" stroke-width="2"/><line x1="27" y1="1" x2="27" y2="17" stroke="currentColor" stroke-width="2"/></svg>
          <span>เรียกใช้ฟังก์ชันย่อย (Subroutine)</span>
          <input type="color" id="clrSubroutine" value="#38bdf8" data-key="subroutine">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><path d="M1,1 H31 V13 Q23,20 16,13 Q9,6 1,13 Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>เอกสาร (Document)</span>
          <input type="color" id="clrDocument" value="#c084fc" data-key="document">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><path d="M1,4 A15,3 0 0 0 31,4 V14 A15,3 0 0 1 1,14 Z" fill="none" stroke="currentColor" stroke-width="2"/><ellipse cx="16" cy="4" rx="15" ry="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>ฐานข้อมูล (Database)</span>
          <input type="color" id="clrDatabase" value="#fb7185" data-key="database">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><path d="M1,1 H24 Q31,1 31,9 Q31,17 24,17 H1 Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>แสดงผลทางจอภาพ (Display)</span>
          <input type="color" id="clrDisplay" value="#29abe2" data-key="display">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><polygon points="16,1 31,9 16,17 1,9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>การตัดสินใจ</span>
          <input type="color" id="clrDecision" value="#8b5cf6" data-key="decision">
        </label>

        <label class="shape-color-row">
          <svg viewBox="0 0 32 18" width="30" height="16"><circle cx="16" cy="9" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>จุดเชื่อมต่อของผังงาน</span>
          <input type="color" id="clrConnector" value="#e53935" data-key="connector">
        </label>

        <div class="color-popover-footer">
          <button class="mini-btn" id="resetShapeColors">รีเซ็ตค่าเริ่มต้น</button>
        </div>
      </div>
    </div>
    <button class="btn" id="themeToggle" title="สลับเป็นโหมดกลางวัน"></button>
    <button class="btn" id="btnViewMmd">{ } ดูโค้ด Mermaid</button>
    <button class="btn" id="btnSVG">ดาวน์โหลด SVG</button>
    <button class="btn" id="btnPNG">ดาวน์โหลด PNG</button>
    <button class="btn primary" id="btnRender">▶ แปลงเป็นภาพ</button>
  </div>

  <div class="main">
    <div class="pane editor-pane">
      <div class="pane-head">
        <span id="editorLabel">โค้ด Mermaid</span>
        <span class="status" id="status"><span class="led"></span><span id="statusText">พร้อมใช้งาน</span></span>
      </div>
      <textarea id="code" spellcheck="false"></textarea>
      <div class="samples" id="samples"></div>
    </div>

    <div class="pane preview-pane">
      <div class="pane-head">
        <span>ตัวอย่างภาพ</span>
        <span id="zoomLabel" style="text-transform:none;letter-spacing:0;">100%</span>
      </div>
      <div id="diagramHost">
        <div class="center-wrap"><div class="empty-hint">เขียนโค้ดทางซ้าย แล้วกด "แปลงเป็นภาพ" เพื่อดูโฟลว์ชาร์ต</div></div>
      </div>
      <div class="zoom-controls">
        <button id="handTool" title="เครื่องมือมือ (ลากเพื่อเลื่อนภาพ)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 12.5V6a1.5 1.5 0 0 1 3 0v5"/>
            <path d="M11 11V4.5a1.5 1.5 0 0 1 3 0V11"/>
            <path d="M14 11.2V5.5a1.5 1.5 0 0 1 3 0V12"/>
            <path d="M17 12v-2a1.5 1.5 0 0 1 3 0v6c0 3.3-2.7 6-6 6h-2.5c-1.9 0-3.4-.8-4.5-2.1L4.2 15.8c-.7-.8-.6-1.9.1-2.5.7-.6 1.7-.5 2.4.1L8 14.8"/>
          </svg>
        </button>
        <button id="zoomOut" title="ซูมออก">−</button>
        <button id="zoomReset" title="รีเซ็ตซูม">⤢</button>
        <button id="zoomIn" title="ซูมเข้า">+</button>
      </div>
      <div class="mmd-drawer" id="mmdDrawer">
        <div class="mmd-drawer-head">
          <span>โค้ด Mermaid ที่แปลงได้อัตโนมัติ</span>
          <div class="row">
            <button class="mini-btn" id="btnCopyMmd">คัดลอก</button>
            <button class="mini-btn" id="btnUseMmd">แก้ไขต่อในโหมด Mermaid</button>
            <button class="mini-btn" id="btnCloseMmd">ปิด ✕</button>
          </div>
        </div>
        <pre id="mmdOutput"></pre>
      </div>
    </div>
  </div>
</div>

<script>
let isLightMode = false;

const SHAPE_COLOR_DEFAULTS = {
  startEnd:    '#ffb84d',
  arrow:       '#5fa8ff',
  process:     '#22c55e',
  input:       '#f2a9e0',
  display:     '#29abe2',
  decision:    '#8b5cf6',
  connector:   '#e53935',
  preparation: '#facc15',
  subroutine:  '#38bdf8',
  document:    '#c084fc',
  database:    '#fb7185'
};
let shapeColors = Object.assign({}, SHAPE_COLOR_DEFAULTS);

function getShapeColor(key){
  const el = document.getElementById('clr' + key[0].toUpperCase() + key.slice(1));
  return (el && el.value) || shapeColors[key];
}

function initMermaidTheme(){
  const arrowColor = getShapeColor('arrow');
  mermaid.initialize({
    startOnLoad:false,
    theme: isLightMode ? 'default' : 'dark',
    securityLevel:'loose',
    flowchart:{ htmlLabels:true },
    themeVariables: isLightMode ? {
      background:'#ffffff', primaryColor:'#eef1f7', primaryTextColor:'#101828',
      primaryBorderColor:arrowColor, lineColor:arrowColor, secondaryColor:'#e2e8f0',
      tertiaryColor:'#eef1f7', fontFamily:'Inter, sans-serif'
    } : {
      background:'#0b1220', primaryColor:'#111a2e', primaryTextColor:'#e7ecf6',
      primaryBorderColor:arrowColor, lineColor:arrowColor, secondaryColor:'#182238',
      tertiaryColor:'#111a2e', fontFamily:'Inter, sans-serif'
    }
  });
}
initMermaidTheme();

/* ---------------------------------------------------------------
   Inject per-shape colors (classDef/class) into flowchart source
   based on the shape syntax of each node, matching the legend:
   ([..]) start/end, [..] process, [/../] input, [\..\] display,
   {..} decision, ((..)) connector.
--------------------------------------------------------------- */
function applyShapeColors(src){
  if(!/^\s*(flowchart|graph)\b/i.test(src)) return src;

  const used = new Set();
  const groups = { startEnd:[], process:[], input:[], display:[], decision:[], connector:[],
                    preparation:[], subroutine:[], document:[], database:[] };

  const collect = (regex, bucket) => {
    let m;
    const re = new RegExp(regex, 'g');
    while((m = re.exec(src)) !== null){
      const id = m[1];
      if(used.has(id)) continue;
      used.add(id);
      groups[bucket].push(id);
    }
  };

  // new-syntax shapes (mermaid v11 `id@{ shape: ..., label: "..." }`)
  collect(String.raw`\b(\w+)@\{\s*shape:\s*sl-rect\b`, 'input');
  collect(String.raw`\b(\w+)@\{\s*shape:\s*hex\b`, 'preparation');
  collect(String.raw`\b(\w+)@\{\s*shape:\s*fr-rect\b`, 'subroutine');
  collect(String.raw`\b(\w+)@\{\s*shape:\s*doc\b`, 'document');
  collect(String.raw`\b(\w+)@\{\s*shape:\s*cyl\b`, 'database');
  collect(String.raw`\b(\w+)@\{\s*shape:\s*curv-trap\b`, 'display');

  collect(String.raw`\b(\w+)\(\(([^()]*)\)\)`, 'connector');
  collect(String.raw`\b(\w+)\(\[([^\[\]]*)\]\)`, 'startEnd');
  collect(String.raw`\b(\w+)\[\/([^\/\]]*)\/\]`, 'input');
  collect(String.raw`\b(\w+)\[\\([^\\\]]*)\\\]`, 'display');
  collect(String.raw`\b(\w+)\{([^{}]*)\}`, 'decision');
  collect(String.raw`\b(\w+)\[([^\[\]]*)\]`, 'process');

  const classDefs = [
    `classDef ffStartEnd fill:${getShapeColor('startEnd')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffProcess fill:${getShapeColor('process')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffInput fill:${getShapeColor('input')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffDisplay fill:${getShapeColor('display')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffDecision fill:${getShapeColor('decision')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffConnector fill:${getShapeColor('connector')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffPreparation fill:${getShapeColor('preparation')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffSubroutine fill:${getShapeColor('subroutine')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffDocument fill:${getShapeColor('document')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`,
    `classDef ffDatabase fill:${getShapeColor('database')},stroke:#0009,stroke-width:1.5px,color:#111827,font-weight:600;`
  ];

  const classAssign = [];
  if(groups.startEnd.length) classAssign.push(`class ${groups.startEnd.join(',')} ffStartEnd`);
  if(groups.process.length) classAssign.push(`class ${groups.process.join(',')} ffProcess`);
  if(groups.input.length) classAssign.push(`class ${groups.input.join(',')} ffInput`);
  if(groups.display.length) classAssign.push(`class ${groups.display.join(',')} ffDisplay`);
  if(groups.decision.length) classAssign.push(`class ${groups.decision.join(',')} ffDecision`);
  if(groups.connector.length) classAssign.push(`class ${groups.connector.join(',')} ffConnector`);
  if(groups.preparation.length) classAssign.push(`class ${groups.preparation.join(',')} ffPreparation`);
  if(groups.subroutine.length) classAssign.push(`class ${groups.subroutine.join(',')} ffSubroutine`);
  if(groups.document.length) classAssign.push(`class ${groups.document.join(',')} ffDocument`);
  if(groups.database.length) classAssign.push(`class ${groups.database.join(',')} ffDatabase`);

  if(classAssign.length === 0) return src;
  return src + '\n' + classDefs.join('\n') + '\n' + classAssign.join('\n');
}

/* ---------------------------------------------------------------
   CODE -> MERMAID CONVERTER (heuristic parser for C-like languages)
--------------------------------------------------------------- */
let nodeCounter = 0;
let connectorCounter = 0;
let nodeDefs = [];
let edgeDefs = [];
let contextStack = []; // stack of { type:'loop'|'switch', continueTarget, breakExits:[] }

function sanitizeLabel(text){
  if(!text) return ' ';
  // Truncate the RAW text first, then escape backslashes. If we escaped
  // first (doubling every `\` to `\\`) and truncated afterwards, the cut
  // could land in the middle of a doubled-backslash pair, leaving a single
  // dangling `\` right before the closing quote or the "..." ellipsis —
  // producing an invalid escape sequence and making Mermaid's parser throw
  // (this is exactly what happened with long strings full of `\x2588`
  // Unicode block escapes, like flag/ASCII-art drawing code).
  let raw = String(text).replace(/\s+/g,' ').trim();
  if(raw.length > 70) raw = raw.slice(0,67) + '...';
  // Escape backslashes AFTER truncating. Node labels can end up inside
  // Mermaid's YAML-like `@{ shape: ..., label: "..." }` syntax, which
  // treats a lone backslash as the start of an escape sequence. Source
  // code that contains string literals with backslashes (\x2588, \n, \t,
  // Windows paths like C:\Users, etc.) would otherwise produce an invalid
  // escape and make Mermaid throw a parse error, breaking the whole
  // conversion. Doubling every backslash keeps it as a literal character.
  let t = raw.replace(/\\/g, '\\\\').replace(/"/g, "'");
  return t || ' ';
}

// Maps our internal shape keys to mermaid v11 expanded-shape names.
// (see: https://mermaid.js.org/syntax/flowchart.html#expanded-node-shapes)
const SHAPE_MAP = {
  input:       'sl-rect',  // Manual Input (sloped rectangle) — keyboard entry (cin/scanf/input()/Scanner)
  preparation: 'hex',      // Preparation (hexagon) — e.g. initializing a loop counter
  subroutine:  'fr-rect',  // Subroutine / Predefined Process (framed rectangle) — user-defined function calls
  document:    'doc',      // Document — writing to a file / printed report
  database:    'cyl',      // Database (cylinder) — SQL / query operations
  output:      'curv-trap' // Display (curved trapezoid) — screen/console output (cout/printf/console.log),
                            // matches the true ANSI/ISO 5807 "Display" symbol instead of a plain parallelogram
};

function newNode(shape, text){
  const id = 'n' + (nodeCounter++);
  const label = sanitizeLabel(text);
  let def;
  if(shape === 'start' || shape === 'end') def = `${id}(["${label}"])`;
  else if(shape === 'decision') def = `${id}{"${label}"}`;
  else if(SHAPE_MAP[shape]) def = `${id}@{ shape: ${SHAPE_MAP[shape]}, label: "${label}" }`;
  else def = `${id}["${label}"]`;
  nodeDefs.push(def);
  return id;
}

// Connector labels cycle A, B, C ... Z, A2, B2, ... to keep circles short.
function nextConnectorLabel(){
  const n = connectorCounter++;
  const letter = String.fromCharCode(65 + (n % 26));
  const round = Math.floor(n / 26);
  return round === 0 ? letter : letter + (round + 1);
}

// A real on-page connector: a small circle, used twice with the SAME label
// (once where flow leaves, once where it re-enters) with NO edge drawn
// between the two — matching the standard flowchart convention for
// avoiding long / crossing loop-back lines.
function newConnectorPair(){
  const label = nextConnectorLabel();
  const outId = 'n' + (nodeCounter++);
  const inId = 'n' + (nodeCounter++);
  nodeDefs.push(`${outId}(("${label}"))`);
  nodeDefs.push(`${inId}(("${label}"))`);
  return { outId, inId };
}

function connect(exits, targetId){
  for(const e of exits){
    edgeDefs.push(`${e.from} -->${e.label ? '|' + sanitizeLabel(e.label) + '|' : ''} ${targetId}`);
  }
}

// Route "exits" back to "targetId" (a loop's condition/start node). If
// connectors are enabled, insert a matching pair of connector circles
// instead of one long back-edge.
function connectLoopBack(exits, targetId, useConnectors){
  if(!exits.length) return;
  if(!useConnectors){
    connect(exits, targetId);
    return;
  }
  const { outId, inId } = newConnectorPair();
  connect(exits, outId);
  edgeDefs.push(`${inId} --> ${targetId}`);
}

function maskLiterals(src){
  const re = new RegExp('"(?:\\\\.|[^"\\\\])*"' + "|'(?:\\\\.|[^'\\\\])*'", 'g');
  return src.replace(re, m => '"' + '_'.repeat(Math.max(0, m.length-2)) + '"');
}

function extractMainBody(origSrc, maskedSrc){
  let braceIdx;
  const mm = maskedSrc.match(/\bmain\s*\([^)]*\)\s*\{/);
  if(mm){
    braceIdx = mm.index + mm[0].length - 1;
  } else {
    const m2 = maskedSrc.match(/\b[\w:<>,\s\*&]+?\s+\w+\s*\([^)]*\)\s*\{/);
    if(m2) braceIdx = m2.index + m2[0].length - 1;
  }
  if(braceIdx === undefined){
    return { orig: origSrc, masked: maskedSrc };
  }
  let depth = 1, j = braceIdx + 1;
  while(j < maskedSrc.length){
    if(maskedSrc[j] === '{') depth++;
    else if(maskedSrc[j] === '}'){ depth--; if(depth === 0) break; }
    j++;
  }
  return { orig: origSrc.slice(braceIdx+1, j), masked: maskedSrc.slice(braceIdx+1, j) };
}

function classifyGeneric(text){
  const t = text.trim();
  // Manual Input: any keyboard-entry construct (rendered as a sloped rectangle)
  if(/^\s*(cin|scanf)\b/.test(t)) return { type:'input', text };
  if(/=\s*(input\s*\(|prompt\s*\(|\w+(\.\w+)*\.(nextInt|nextLine|nextDouble|next)\s*\()/.test(t)) return { type:'input', text };
  // Console/screen output
  if(/^\s*(cout|printf|wprintf|print|System\.out\.print(ln)?|console\.log)\b/.test(t)) return { type:'output', text };
  // Document: writing to a file / printed report
  if(/\b(ofstream|fprintf|fputs|fwrite)\b/.test(t) && !/\bstdout\b/.test(t)) return { type:'document', text };
  if(/\.(write|writelines|writeAllText)\s*\(/.test(t) || /\bfs\.writeFile\w*\s*\(/.test(t)) return { type:'document', text };
  // Database: SQL / query-style operations
  if(/\b(SELECT|INSERT\s+INTO|UPDATE\s+\w+\s+SET|DELETE\s+FROM)\b/i.test(t)) return { type:'database', text };
  if(/\.(query|execute|executeQuery|executeUpdate)\s*\(/.test(t) || /\b(cursor|connection|conn|db)\s*\.\s*\w+\s*\(/.test(t)) return { type:'database', text };
  // Subroutine: a bare call to a (presumably user-defined) function/method,
  // i.e. the whole statement IS the call — not an assignment, not a
  // control-flow keyword. Matches the "Predefined Process" flowchart symbol.
  if(/^[A-Za-z_]\w*(\.[A-Za-z_]\w*)*\s*\([^]*\)\s*;?\s*$/.test(t) && !/[=]/.test(t.replace(/[<>=!]=/g,''))){
    return { type:'subroutine', text };
  }
  return { type:'simple', text };
}

function extractOutputLabel(text){
  let t = text.replace(/;\s*$/, '');
  if(/^\s*cout/.test(t)){
    const rest = t.replace(/^\s*cout\s*/, '');
    const parts = rest.split('<<').map(p=>p.trim()).filter(Boolean);
    const out = [];
    for(const p of parts){
      if(p === 'endl' || p === 'std::endl') continue;
      const sm = p.match(/^"([\s\S]*)"$/);
      if(sm) out.push(sm[1].replace(/\\n/g,' ').replace(/\\t/g,' '));
      else out.push('{' + p + '}');
    }
    return out.join('').trim() || 'แสดงผล';
  }
  const pm = t.match(/\(([\s\S]*)\)\s*$/);
  if(pm){
    return pm[1].split(/[+,]/).map(s=>{
      const cleaned = s.trim().replace(/^L(?=")/, ''); // strip wide-string L prefix, e.g. L"text"
      const sm = cleaned.match(/^"([\s\S]*)"$/);
      return sm ? sm[1] : '{' + s.trim() + '}';
    }).join(' ').trim() || 'แสดงผล';
  }
  return t;
}

function extractDocumentLabel(text){
  return 'บันทึกเอกสาร: ' + text.replace(/;\s*$/, '').trim();
}

function extractDatabaseLabel(text){
  return 'ฐานข้อมูล: ' + text.replace(/;\s*$/, '').trim();
}

function extractSubroutineLabel(text){
  return text.replace(/;\s*$/, '').trim();
}

function extractInputLabel(text){
  let t = text.replace(/;\s*$/, '');
  if(/^\s*cin/.test(t)){
    const parts = t.replace(/^\s*cin\s*/, '').split('>>').map(p=>p.trim()).filter(Boolean);
    return 'รับค่า: ' + parts.join(', ');
  }
  const m = t.match(/scanf\s*\(([\s\S]*)\)/);
  if(m){
    const args = m[1].split(',').map(s=>s.trim());
    return 'รับค่า: ' + args.slice(1).join(', ').replace(/&/g,'');
  }
  return t;
}

// Statements that only configure the console/terminal or runtime locale —
// not part of the algorithm itself. Hidden from the flowchart when the
// "ซ่อนคำสั่งระบบ" toggle is on, so readers focus on the logic, not on
// console plumbing.
const SYSTEM_CALL_PATTERNS = [
  /^_setmode\s*\(/i,
  /^_fileno\s*\(/i,
  /^GetStdHandle\s*\(/i,
  /^SetConsoleTextAttribute\s*\(/i,
  /^SetConsoleOutputCP\s*\(/i,
  /^SetConsoleCP\s*\(/i,
  /^setlocale\s*\(/i,
  /^system\s*\(\s*"(cls|clear|pause|chcp[^"]*)"\s*\)/i,
  /^std::ios(_base)?::sync_with_stdio\s*\(/i,
  /^ios_base::sync_with_stdio\s*\(/i,
  /^cin\.tie\s*\(/i,
  /^setvbuf\s*\(/i
];
function isSystemCall(text){
  const t = text.trim();
  return SYSTEM_CALL_PATTERNS.some(re => re.test(t));
}

// Console-formatting calls (set color / move cursor) that, when placed
// right before an output statement, read more naturally as ONE box —
// e.g. `textcolor(RED); wprintf(L"เกิดข้อผิดพลาด");` becomes a single
// "แสดงผลข้อความ (ปรับสี): ..." box instead of two separate boxes.
const GROUP_PREFIX_PATTERNS = [
  { re:/^(textcolor|settextcolor|setcolor|textbackground)\s*\(/i, note:'ปรับสีข้อความ' },
  { re:/^gotoxy\s*\(/i, note:'ย้ายตำแหน่งเคอร์เซอร์' }
];
function matchGroupPrefix(text){
  const t = text.trim();
  for(const p of GROUP_PREFIX_PATTERNS){ if(p.re.test(t)) return p.note; }
  return null;
}

// Walks the parsed statement tree (recursing into every nested body:
// if/else, loops, switch-cases, try/catch/finally) applying, in order:
//  1) system-call hiding — matching statements are dropped entirely
//     (the flow just skips over them, no dangling node)
//  2) output grouping — a formatting call immediately followed by an
//     output statement collapses into a single output node
function postProcessStmts(stmts, opts){
  const hideSystem = !!opts.hideSystem;
  const groupOutputs = !!opts.groupOutputs;

  // Recurse first so nested blocks are cleaned up too.
  for(const s of stmts){
    if(s.thenBody) s.thenBody = postProcessStmts(s.thenBody, opts);
    if(s.elseBody) s.elseBody = postProcessStmts(s.elseBody, opts);
    if(s.body && Array.isArray(s.body)) s.body = postProcessStmts(s.body, opts);
    if(s.tryBody) s.tryBody = postProcessStmts(s.tryBody, opts);
    if(s.catchBody) s.catchBody = postProcessStmts(s.catchBody, opts);
    if(s.finallyBody) s.finallyBody = postProcessStmts(s.finallyBody, opts);
    if(s.cases) s.cases.forEach(c => { c.body = postProcessStmts(c.body, opts); });
  }

  let out = stmts;
  if(hideSystem){
    out = out.filter(s => !((s.type === 'simple' || s.type === 'subroutine') && isSystemCall(s.text)));
  }

  if(groupOutputs){
    const merged = [];
    for(let k = 0; k < out.length; k++){
      const cur = out[k];
      const next = out[k+1];
      if(next && next.type === 'output' &&
         (cur.type === 'simple' || cur.type === 'subroutine')){
        const note = matchGroupPrefix(cur.text);
        if(note){
          merged.push({ type:'output', text: next.text, groupNote: note });
          k++; // consume the paired output too
          continue;
        }
      }
      merged.push(cur);
    }
    out = merged;
  }

  return out;
}

function parseStatements(orig, masked){
  let i = 0;
  const n = masked.length;
  const stmts = [];

  function skipWs(){ while(i < n && /\s/.test(masked[i])) i++; }
  function matchKeyword(kw){ skipWs(); return new RegExp('^' + kw + '\\b').test(masked.slice(i)); }
  function findMatching(openCh, closeCh, start){
    let depth = 1, j = start + 1;
    while(j < n){
      if(masked[j] === openCh) depth++;
      else if(masked[j] === closeCh){ depth--; if(depth === 0) return j; }
      j++;
    }
    return n - 1;
  }
  function readParenGroup(){
    skipWs();
    const start = i;
    const end = findMatching('(', ')', i);
    const content = orig.slice(start+1, end);
    i = end + 1;
    return content.trim();
  }
  function readBlockOrSingle(){
    skipWs();
    if(masked[i] === '{'){
      const start = i, end = findMatching('{', '}', i);
      const io = orig.slice(start+1, end), im = masked.slice(start+1, end);
      i = end + 1;
      return parseStatements(io, im);
    }
    const s = readSingleStatement();
    return s ? [s] : [];
  }
  function skipToSemi(){
    let depth = 0;
    while(i < n){
      const c = masked[i];
      if(c === '(' || c === '[') depth++;
      else if(c === ')' || c === ']') depth--;
      else if(c === ';' && depth <= 0){ i++; break; }
      i++;
    }
  }
  function readGenericStatement(){
    const start = i;
    let depth = 0;
    while(i < n){
      const c = masked[i];
      if(c === '(' || c === '[') depth++;
      else if(c === ')' || c === ']') depth--;
      else if(c === ';' && depth <= 0) break;
      else if(c === '{' && depth <= 0) break;
      i++;
    }
    const text = orig.slice(start, i).trim();
    if(masked[i] === ';') i++;
    if(!text) return null;
    return classifyGeneric(text);
  }
  function readIf(){
    i += 2;
    const cond = readParenGroup();
    const thenBody = readBlockOrSingle();
    skipWs();
    let elseBody = null;
    if(matchKeyword('else')){
      i += 4; skipWs();
      elseBody = matchKeyword('if') ? [readIf()] : readBlockOrSingle();
    }
    return { type:'if', cond, thenBody, elseBody };
  }
  function readWhile(){
    i += 5;
    const cond = readParenGroup();
    const body = readBlockOrSingle();
    return { type:'while', cond, body };
  }
  function readDoWhile(){
    i += 2;
    const body = readBlockOrSingle();
    skipWs();
    if(matchKeyword('while')) i += 5;
    const cond = readParenGroup();
    skipWs();
    if(masked[i] === ';') i++;
    return { type:'dowhile', cond, body };
  }
  function splitForParts(maskedInner, origInner){
    let depth = 0; const idxs = [];
    for(let k=0;k<maskedInner.length;k++){
      const c = maskedInner[k];
      if(c==='('||c==='[') depth++;
      else if(c===')'||c===']') depth--;
      else if(c===';' && depth===0) idxs.push(k);
    }
    if(idxs.length < 2) return { init:'', cond: origInner.trim(), incr:'' };
    return {
      init: origInner.slice(0, idxs[0]).trim(),
      cond: origInner.slice(idxs[0]+1, idxs[1]).trim(),
      incr: origInner.slice(idxs[1]+1).trim()
    };
  }
  function readFor(){
    i += 3; skipWs();
    const start = i, end = findMatching('(', ')', i);
    const innerOrig = orig.slice(start+1, end), innerMasked = masked.slice(start+1, end);
    i = end + 1;
    const parts = splitForParts(innerMasked, innerOrig);
    const body = readBlockOrSingle();
    return { type:'for', init:parts.init, cond:parts.cond, incr:parts.incr, body };
  }
  function parseCases(orig2, masked2){
    const cases = [];
    const re = /\b(case\s+[^:]+|default)\s*:/g;
    const matches = []; let m;
    while((m = re.exec(masked2))) matches.push({ index:m.index, end:re.lastIndex, text:m[1] });
    for(let k=0;k<matches.length;k++){
      const bodyStart = matches[k].end;
      const bodyEnd = k+1 < matches.length ? matches[k+1].index : masked2.length;
      const label = orig2.slice(matches[k].index, matches[k].end-1).trim();
      cases.push({
        label,
        body: parseStatements(orig2.slice(bodyStart, bodyEnd), masked2.slice(bodyStart, bodyEnd))
      });
    }
    return cases;
  }
  function readSwitch(){
    i += 6;
    const expr = readParenGroup();
    skipWs();
    const start = i, end = findMatching('{', '}', i);
    const cases = parseCases(orig.slice(start+1, end), masked.slice(start+1, end));
    i = end + 1;
    return { type:'switch', expr, cases };
  }
  function readTry(){
    i += 3; // consume 'try'
    const tryBody = readBlockOrSingle();
    let catchBody = [];
    let hasCatch = false;
    skipWs();
    while(matchKeyword('catch')){
      hasCatch = true;
      i += 5; skipWs();
      if(masked[i] === '('){ readParenGroup(); } // catch parameter, not needed for the diagram
      catchBody = catchBody.concat(readBlockOrSingle());
      skipWs();
    }
    let finallyBody = null;
    if(matchKeyword('finally')){
      i += 7;
      finallyBody = readBlockOrSingle();
    }
    return { type:'trycatch', tryBody, catchBody, hasCatch, finallyBody };
  }
  function readReturn(){
    i += 6; // consume 'return'
    skipWs();
    const start = i;
    skipToSemi();
    const text = orig.slice(start, Math.max(start, i-1)).trim();
    return { type:'return', text };
  }
  function readSingleStatement(){
    skipWs();
    if(i >= n) return null;
    if(matchKeyword('if')) return readIf();
    if(matchKeyword('while')) return readWhile();
    if(matchKeyword('for')) return readFor();
    if(matchKeyword('do')) return readDoWhile();
    if(matchKeyword('switch')) return readSwitch();
    if(matchKeyword('try')) return readTry();
    if(matchKeyword('return')) return readReturn();
    if(matchKeyword('throw')){
      i += 5; skipWs();
      const start = i;
      skipToSemi();
      const text = orig.slice(start, Math.max(start, i-1)).trim();
      return { type:'throw', text };
    }
    if(matchKeyword('break')){ skipToSemi(); return { type:'break' }; }
    if(matchKeyword('continue')){ skipToSemi(); return { type:'continue' }; }
    if(masked[i] === '{'){
      const start = i, end = findMatching('{', '}', i);
      const io = orig.slice(start+1,end), im = masked.slice(start+1,end);
      i = end + 1;
      return { type:'block', body: parseStatements(io, im) };
    }
    return readGenericStatement();
  }

  while(true){
    skipWs();
    if(i >= n) break;
    const before = i;
    const s = readSingleStatement();
    if(!s){ if(i === before) break; else continue; }
    if(s.type === 'block') stmts.push(...s.body);
    else stmts.push(s);
    if(i === before) break; // safety against infinite loop
  }
  return stmts;
}

function processStatements(stmts, entryExits){
  let exits = entryExits;
  for(const stmt of stmts){
    if(!exits.length) break; // dead code after return/etc — stop routing
    exits = processStatement(stmt, exits);
  }
  return exits;
}

// Find the nearest enclosing context matching a predicate (innermost first).
function findContext(pred){
  for(let k = contextStack.length - 1; k >= 0; k--){
    if(pred(contextStack[k])) return contextStack[k];
  }
  return null;
}

function processStatement(stmt, entryExits){
  const useConnectors = true; // always use connector circles for loop-backs

  switch(stmt.type){
    case 'simple': {
      const id = newNode('process', stmt.text.replace(/;\s*$/, ''));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'input': {
      const id = newNode('input', extractInputLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'output': {
      const label = stmt.groupNote
        ? `แสดงผลข้อความ (${stmt.groupNote}): ${extractOutputLabel(stmt.text)}`
        : extractOutputLabel(stmt.text);
      const id = newNode('output', label);
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'document': {
      const id = newNode('document', extractDocumentLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'database': {
      const id = newNode('database', extractDatabaseLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'subroutine': {
      const id = newNode('subroutine', extractSubroutineLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'if': {
      const id = newNode('decision', stmt.cond);
      connect(entryExits, id);
      const thenExits = processStatements(stmt.thenBody, [{ from:id, label:'ใช่' }]);
      const elseExits = stmt.elseBody
        ? processStatements(stmt.elseBody, [{ from:id, label:'ไม่' }])
        : [{ from:id, label:'ไม่' }];
      return thenExits.concat(elseExits);
    }
    case 'while': {
      const id = newNode('decision', stmt.cond);
      connect(entryExits, id);
      const ctx = { type:'loop', continueTarget:id, breakExits:[] };
      contextStack.push(ctx);
      const bodyExits = processStatements(stmt.body, [{ from:id, label:'ใช่' }]);
      contextStack.pop();
      connectLoopBack(bodyExits, id, useConnectors);
      // A literal `while(true)`/`while(1)` can never evaluate false, so the
      // "ไม่" exit is unreachable — omit it instead of wiring a dead arrow
      // to whatever code happens to follow (which real execution can never
      // reach, e.g. a trailing `return` after the loop).
      const condIsAlwaysTrue = /^\s*(true|1)\s*$/i.test(stmt.cond || '');
      return condIsAlwaysTrue ? [...ctx.breakExits] : [{ from:id, label:'ไม่' }, ...ctx.breakExits];
    }
    case 'dowhile': {
      const startId = newNode('process', 'เริ่มลูป');
      connect(entryExits, startId);
      // Pre-create the condition node so `continue` (which jumps to the
      // bottom-of-loop test in a do-while) has a target while the body
      // is still being processed.
      const condId = newNode('decision', stmt.cond);
      const ctx = { type:'loop', continueTarget:condId, breakExits:[] };
      contextStack.push(ctx);
      const bodyExits = processStatements(stmt.body, [{ from:startId }]);
      contextStack.pop();
      connect(bodyExits, condId);
      connectLoopBack([{ from:condId, label:'ใช่' }], startId, useConnectors);
      return [{ from:condId, label:'ไม่' }, ...ctx.breakExits];
    }
    case 'for': {
      let exits = entryExits;
      if(stmt.init){
        // Standard convention: initializing the loop-control variable
        // uses the Preparation (hexagon) symbol, not a plain process box.
        const initId = newNode('preparation', stmt.init);
        connect(exits, initId);
        exits = [{ from:initId }];
      }
      const condId = newNode('decision', stmt.cond || 'true');
      connect(exits, condId);
      // Pre-create the increment node (if any) so `continue` can target it —
      // in a for-loop, continue runs the increment before re-testing.
      const incrId = stmt.incr ? newNode('process', stmt.incr) : null;
      const ctx = { type:'loop', continueTarget: incrId || condId, breakExits:[] };
      contextStack.push(ctx);
      let bodyExits = processStatements(stmt.body, [{ from:condId, label:'ใช่' }]);
      contextStack.pop();
      if(incrId){
        connect(bodyExits, incrId);
        connectLoopBack([{ from:incrId }], condId, useConnectors);
      } else {
        connectLoopBack(bodyExits, condId, useConnectors);
      }
      const forCondIsAlwaysTrue = /^\s*(true|1)?\s*$/i.test(stmt.cond || '');
      return forCondIsAlwaysTrue ? [...ctx.breakExits] : [{ from:condId, label:'ไม่' }, ...ctx.breakExits];
    }
    case 'switch': {
      const id = newNode('decision', stmt.expr);
      connect(entryExits, id);
      const ctx = { type:'switch', breakExits:[] };
      contextStack.push(ctx);
      let fallExits = []; // C-style fallthrough: flow that "fell off the
                           // end" of the previous case with no break
      for(const c of stmt.cases){
        const caseEntry = [{ from:id, label:c.label }, ...fallExits];
        fallExits = processStatements(c.body, caseEntry);
      }
      contextStack.pop();
      // Anything that fell through past the very last case, plus every
      // explicit `break;` hit anywhere inside the switch, both exit here.
      return ctx.breakExits.concat(fallExits);
    }
    case 'trycatch': {
      // Simplified approximation: try-block runs, then a decision asks
      // whether an exception occurred. This can't know at flowchart-time
      // which line actually throws, but it keeps both paths visible,
      // which is the usual convention for showing try/catch on a flowchart.
      const tryExits = processStatements(stmt.tryBody, entryExits);
      if(!stmt.hasCatch){
        if(stmt.finallyBody && stmt.finallyBody.length){
          return processStatements(stmt.finallyBody, tryExits);
        }
        return tryExits;
      }
      const decId = newNode('decision', 'เกิดข้อผิดพลาด (exception)?');
      connect(tryExits, decId);
      const catchExits = processStatements(stmt.catchBody, [{ from:decId, label:'ใช่' }]);
      let exits = [{ from:decId, label:'ไม่' }].concat(catchExits);
      if(stmt.finallyBody && stmt.finallyBody.length){
        return processStatements(stmt.finallyBody, exits);
      }
      return exits;
    }
    case 'return': {
      const id = newNode('end', stmt.text ? ('return ' + stmt.text) : 'return');
      connect(entryExits, id);
      return [];
    }
    case 'throw': {
      // Treated as terminal within its own block, same as return/break —
      // the surrounding try/catch's "เกิดข้อผิดพลาด?" decision already
      // represents the possibility of an exception, so the code path
      // that explicitly throws simply stops here rather than
      // (incorrectly) falling through to the next statement.
      const id = newNode('process', stmt.text ? ('โยนข้อยกเว้น: ' + stmt.text) : 'โยนข้อยกเว้น');
      connect(entryExits, id);
      return [];
    }
    case 'break': {
      const id = newNode('process', 'break');
      connect(entryExits, id);
      const ctx = contextStack.length ? contextStack[contextStack.length - 1] : null;
      if(ctx) ctx.breakExits.push({ from:id });
      return []; // code after break in this block is unreachable
    }
    case 'continue': {
      const id = newNode('process', 'continue');
      connect(entryExits, id);
      const ctx = findContext(c => c.type === 'loop'); // continue always targets the nearest LOOP, even through a switch
      if(ctx) connect([{ from:id }], ctx.continueTarget);
      return []; // code after continue in this block is unreachable
    }
    default:
      return entryExits;
  }
}

function convertCodeToMermaid(src){
  nodeCounter = 0; connectorCounter = 0; nodeDefs = []; edgeDefs = []; contextStack = [];
  let s = src.replace(/\/\*[\s\S]*?\*\//g, m => ' '.repeat(m.length));
  s = s.replace(/\/\/.*$/gm, m => ' '.repeat(m.length));
  s = s.replace(/^\s*#.*$/gm, '');
  s = s.replace(/^\s*using\s+namespace\s+\w+\s*;\s*$/gm, '');
  s = s.replace(/^\s*(import|package)\s+[^\n]*$/gm, '');

  const masked = maskLiterals(s);
  const body = extractMainBody(s, masked);
  let stmts = parseStatements(body.orig, body.masked);
  stmts = postProcessStmts(stmts, { hideSystem: true, groupOutputs: true });

  if(!stmts.length){
    throw new Error('ไม่พบคำสั่งที่แปลงเป็นผังงานได้ ลองตรวจสอบว่าโค้ดมีฟังก์ชัน main() หรือมีคำสั่งอยู่จริง');
  }

  const startId = newNode('start', 'เริ่มต้น');
  let exits = processStatements(stmts, [{ from:startId }]);
  if(exits.length){
    const endId = newNode('end', 'จบ');
    connect(exits, endId);
  }

  const lines = ['flowchart TD'];
  nodeDefs.forEach(d => lines.push('    ' + d));
  edgeDefs.forEach(e => lines.push('    ' + e));
  return lines.join('\n');
}

/* ---------------------------------------------------------------
   RENDERING
--------------------------------------------------------------- */
function applyDirectionIfFlowchart(src){
  const dir = dirEl.value;
  const trimmed = src.trim();
  const m = trimmed.match(/^(flowchart|graph)\s+(TD|TB|LR|RL|BT)/i);
  if(m) return trimmed.replace(/^(flowchart|graph)\s+(TD|TB|LR|RL|BT)/i, `$1 ${dir}`);
  return src;
}

async function render(){
  const raw = codeEl.value.trim();
  if(!raw){
    host.innerHTML = '<div class="center-wrap"><div class="empty-hint">เขียนโค้ดทางซ้าย แล้วกด "แปลงเป็นภาพ" เพื่อดูโฟลว์ชาร์ต</div></div>';
    setStatus(true, 'พร้อมใช้งาน');
    lastGeneratedMermaid = null;
    return;
  }

  let mermaidSrc;
  if(modeEl.value === 'code'){
    try{
      mermaidSrc = convertCodeToMermaid(raw);
      lastGeneratedMermaid = mermaidSrc;
    }catch(err){
      const msg = (err && err.message) ? err.message : String(err);
      host.innerHTML = `<div class="center-wrap"><div class="error-box"><b>แปลงซอร์สโค้ดไม่สำเร็จ</b>\n\n${msg}</div></div>`;
      setStatus(false, 'แปลงโค้ดไม่สำเร็จ');
      return;
    }
  } else {
    mermaidSrc = raw;
    lastGeneratedMermaid = null;
  }

  const src = applyShapeColors(applyDirectionIfFlowchart(mermaidSrc));
  const id = 'mmd-' + (renderCounter++);
  try{
    const { svg } = await mermaid.render(id, src);
    lastGoodSVG = svg;
    host.innerHTML = `<div class="center-wrap"><div class="transform-wrap" id="tw">${svg}</div></div>`;
    setStatus(true, 'แปลงสำเร็จ');
    if(mmdOutput) mmdOutput.textContent = lastGeneratedMermaid || '';

    // Measure natural size, then auto-fit large diagrams so nothing starts off-screen.
    requestAnimationFrame(()=>{
      const svgEl = document.querySelector('#tw svg');
      if(svgEl){
        // Mermaid attaches its own responsive `max-width` (and sometimes
        // width/height) inline style so the SVG auto-shrinks to fit
        // whatever container it's dropped into. That's exactly what was
        // breaking wide LR/RL diagrams: getBoundingClientRect() measured
        // the box AFTER mermaid's own CSS had already shrunk it to the
        // container width, so "natural size" was never the diagram's real
        // size for anything wider than the host panel — the fit/zoom math
        // was built on a wrong number from the start. Strip that styling
        // and read the true size straight from viewBox instead, which is
        // always accurate no matter the diagram's orientation or aspect ratio.
        svgEl.removeAttribute('style');
        svgEl.style.maxWidth = 'none';
        svgEl.style.maxHeight = 'none';

        const viewBox = svgEl.getAttribute('viewBox');
        const vb = viewBox ? viewBox.trim().split(/\s+/).map(Number) : null;
        if(vb && vb.length === 4 && vb[2] > 0 && vb[3] > 0){
          naturalW = vb[2];
          naturalH = vb[3];
        } else {
          const svgBox = svgEl.getBoundingClientRect();
          naturalW = svgBox.width;
          naturalH = svgBox.height;
        }
        const hostBox = host.getBoundingClientRect();
        const fitScale = Math.min(
          (hostBox.width - 64) / naturalW,
          (hostBox.height - 64) / naturalH
        );
        // If this diagram needs to be smaller than the default floor just
        // to fit, lower the floor for it (with 30% headroom to zoom out
        // a bit further still) instead of clamping and leaving it oversized.
        if(isFinite(fitScale) && fitScale > 0){
          MIN_SCALE = Math.min(0.02, fitScale * 0.7);
        }
        scale = (isFinite(fitScale) && fitScale < 1) ? Math.max(MIN_SCALE, fitScale) : 1;
      }
      panX = 0; panY = 0;
      applyZoom();
    });
  }catch(err){
    const msg = (err && err.message) ? err.message : String(err);
    host.innerHTML = `<div class="center-wrap"><div class="error-box"><b>สร้างผังงานไม่สำเร็จ</b>\n\n${msg}</div></div>`;
    setStatus(false, 'พบข้อผิดพลาด');
    document.querySelectorAll('body > svg[id^="mmd-"]').forEach(n => n.remove());
  }
}

let naturalW = null;
let naturalH = null;

function applyZoom(){
  const tw = document.getElementById('tw');
  const svgEl = document.querySelector('#tw svg');
  // Resize the actual SVG element rather than CSS-scaling it. A CSS
  // `transform: scale()` on vector content gets rasterized once by the
  // GPU compositor and then stretched, which is what causes the blur —
  // especially noticeable when zoomed in a lot. Setting real width/height
  // on the SVG makes the browser re-render the vector paths crisply at
  // the exact target size, at any zoom level.
  if(svgEl && naturalW && naturalH){
    svgEl.style.width = (naturalW * scale) + 'px';
    svgEl.style.height = (naturalH * scale) + 'px';
  }
  if(tw){
    tw.style.transform = `translate(${panX}px, ${panY}px)`;
  }
  zoomLabel.textContent = Math.round(scale*100) + '%';
}

document.getElementById('btnRender').onclick = render;
dirEl.onchange = render;

document.getElementById('zoomIn').onclick = ()=>{ scale = Math.min(scale * 1.25, MAX_SCALE); applyZoom(); };
document.getElementById('zoomOut').onclick = ()=>{ scale = Math.max(scale / 1.25, MIN_SCALE); applyZoom(); };
document.getElementById('zoomReset').onclick = ()=>{ scale = 1; panX = 0; panY = 0; applyZoom(); };

/* ---------------------------------------------------------------
   HAND TOOL (click-and-drag panning)
--------------------------------------------------------------- */
const handBtn = document.getElementById('handTool');
let handToolOn = false;
let isPanning = false;
let panStartX = 0, panStartY = 0, scrollStartX = 0, scrollStartY = 0;

handBtn.onclick = ()=>{
  handToolOn = !handToolOn;
  handBtn.classList.toggle('active', handToolOn);
  host.classList.toggle('hand-mode', handToolOn);
};

host.addEventListener('mousedown', (e)=>{
  if(!handToolOn) return;
  isPanning = true;
  host.classList.add('panning');
  panStartX = e.clientX; panStartY = e.clientY;
  scrollStartX = panX; scrollStartY = panY;
  e.preventDefault();
});
window.addEventListener('mousemove', (e)=>{
  if(!isPanning) return;
  panX = scrollStartX + (e.clientX - panStartX);
  panY = scrollStartY + (e.clientY - panStartY);
  applyZoom();
});
window.addEventListener('mouseup', ()=>{
  if(isPanning){ isPanning = false; host.classList.remove('panning'); }
});

host.addEventListener('touchstart', (e)=>{
  if(!handToolOn || e.touches.length !== 1) return;
  isPanning = true;
  host.classList.add('panning');
  panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
  scrollStartX = panX; scrollStartY = panY;
}, { passive:true });
host.addEventListener('touchmove', (e)=>{
  if(!isPanning || e.touches.length !== 1) return;
  panX = scrollStartX + (e.touches[0].clientX - panStartX);
  panY = scrollStartY + (e.touches[0].clientY - panStartY);
  applyZoom();
}, { passive:true });
host.addEventListener('touchend', ()=>{
  isPanning = false;
  host.classList.remove('panning');
});

/* Mouse-wheel zoom, centered on the cursor position */
host.addEventListener('wheel', (e)=>{
  if(!document.querySelector('#tw svg')) return;
  e.preventDefault();

  const hostBox = host.getBoundingClientRect();
  const mx = e.clientX - (hostBox.left + hostBox.width / 2);
  const my = e.clientY - (hostBox.top + hostBox.height / 2);

  const oldScale = scale;
  const zoomStep = 1.1;
  const newScale = e.deltaY < 0
    ? Math.min(scale * zoomStep, MAX_SCALE)
    : Math.max(scale / zoomStep, MIN_SCALE);

  if(newScale === oldScale) return;

  // Keep the point currently under the cursor fixed on screen while zooming.
  panX = mx - (newScale / oldScale) * (mx - panX);
  panY = my - (newScale / oldScale) * (my - panY);
  scale = newScale;
  applyZoom();
}, { passive:false });

document.getElementById('btnSVG').onclick = ()=>{
  if(!lastGoodSVG){ alert('กรุณาแปลงโค้ดเป็นภาพก่อน'); return; }
  const blob = new Blob([lastGoodSVG], { type:'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flowchart.svg'; a.click();
  URL.revokeObjectURL(url);
};

// Mermaid always embeds node/edge labels as <foreignObject><div>...</div></foreignObject>
// (this happens no matter how htmlLabels/defaultRenderer are configured in recent
// Mermaid versions). Browsers refuse to export a <canvas> that was ever painted from
// an <img> whose SVG source contains a <foreignObject> ("Tainted canvases may not be
// exported"). To make PNG export work reliably we rewrite every foreignObject label
// into a plain SVG <text> element (with tspans for multi-line labels) before
// rasterizing, so the exported image never touches a foreignObject at all.
function convertForeignObjectsToSvgText(svgRoot){
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const foreignObjects = Array.from(svgRoot.querySelectorAll('foreignObject'));
  foreignObjects.forEach(fo=>{
    const width = parseFloat(fo.getAttribute('width')) || 0;
    const height = parseFloat(fo.getAttribute('height')) || 0;
    const holder = fo.querySelector('span, p, div') || fo;

    let color = '#ccc';
    let fontWeight = 'normal';
    let fontSize = '16px';
    try{
      const cs = window.getComputedStyle(holder);
      if(cs){
        if(cs.color) color = cs.color;
        if(cs.fontWeight) fontWeight = cs.fontWeight;
        if(cs.fontSize) fontSize = cs.fontSize;
      }
    }catch(e){ /* ignore, fall back to defaults */ }

    // Split into lines: prefer explicit <p>/<br> blocks, else treat as one line.
    let lines = [];
    const ps = fo.querySelectorAll('p');
    if(ps.length > 1){
      lines = Array.from(ps).map(p=>p.textContent.trim());
    } else {
      const raw = (fo.textContent || '').replace(/\u00a0/g,' ').trim();
      lines = raw.split(/\n+/).map(s=>s.trim()).filter(Boolean);
      if(lines.length === 0) lines = [''];
    }

    const textEl = document.createElementNS(SVG_NS, 'text');
    textEl.setAttribute('text-anchor', 'middle');
    textEl.setAttribute('fill', color);
    textEl.setAttribute('style', 'font-family:Inter,sans-serif;font-size:' + fontSize + ';font-weight:' + fontWeight + ';');

    const lineHeight = Math.min(height / Math.max(lines.length, 1), 22) || 16;
    const totalH = lineHeight * lines.length;
    const startY = (height / 2) - (totalH / 2) + (lineHeight * 0.8);

    lines.forEach((line, i)=>{
      const tspan = document.createElementNS(SVG_NS, 'tspan');
      tspan.setAttribute('x', String(width / 2));
      tspan.setAttribute('y', String(startY + i * lineHeight));
      tspan.textContent = line;
      textEl.appendChild(tspan);
    });

    if(fo.parentNode) fo.parentNode.replaceChild(textEl, fo);
  });
}

document.getElementById('btnPNG').onclick = ()=>{
  if(!lastGoodSVG){ alert('กรุณาแปลงโค้ดเป็นภาพก่อน'); return; }

  // ใช้ SVG node ที่ render อยู่จริงในหน้า (ผ่าน HTML parser ซึ่งรองรับ entity ของ mermaid ได้กว้างกว่า)
  // แทนการ parse string ด้วย DOMParser แบบ XML เข้มงวด ที่อาจ error กับบาง entity แล้วโหลดภาพไม่ได้
  const liveSvg = document.querySelector('#tw svg');
  if(!liveSvg){
    alert('ไม่พบภาพผังงานในขณะนี้ กรุณาแปลงเป็นภาพก่อน');
    return;
  }

  const svgClone = liveSvg.cloneNode(true);
  let w = 0, h = 0;

  const wAttr = parseFloat(svgClone.getAttribute('width'));
  const hAttr = parseFloat(svgClone.getAttribute('height'));
  const viewBox = svgClone.getAttribute('viewBox');

  if(wAttr && hAttr && !isNaN(wAttr) && !isNaN(hAttr)){
    w = wAttr; h = hAttr;
  } else if(viewBox){
    const parts = viewBox.trim().split(/\s+/).map(Number);
    if(parts.length === 4 && parts[2] && parts[3]){ w = parts[2]; h = parts[3]; }
  }
  if((!w || !h) && naturalW && naturalH){
    w = naturalW; h = naturalH;
  }
  if(!w || !h){ w = 1200; h = 800; }

  svgClone.setAttribute('width', String(w));
  svgClone.setAttribute('height', String(h));
  svgClone.style.width = '';
  svgClone.style.height = '';
  if(!svgClone.getAttribute('xmlns')) svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  convertForeignObjectsToSvgText(svgClone);

  const svgMarkup = new XMLSerializer().serializeToString(svgClone);
  const svgBlob = new Blob([svgMarkup], { type:'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();

  img.onerror = ()=>{
    URL.revokeObjectURL(url);
    alert('ไม่สามารถสร้างไฟล์ PNG ได้ ลองใช้ปุ่ม "ดาวน์โหลด SVG" แทน หรือแปลงเป็นภาพใหม่อีกครั้ง');
  };

  img.onload = ()=>{
    try{
      const scaleFactor = 2;
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(w * scaleFactor));
      canvas.height = Math.max(1, Math.round(h * scaleFactor));
      const ctx = canvas.getContext('2d');
      ctx.scale(scaleFactor, scaleFactor);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob=>{
        if(!blob){
          alert('ไม่สามารถสร้างไฟล์ PNG ได้ ลองใช้ปุ่ม "ดาวน์โหลด SVG" แทน');
          return;
        }
        const pngUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = pngUrl; a.download = 'flowchart.png'; a.click();
        URL.revokeObjectURL(pngUrl);
      }, 'image/png');
    } catch(err){
      alert('เกิดข้อผิดพลาดขณะสร้าง PNG: ' + (err && err.message ? err.message : String(err)));
    } finally {
      URL.revokeObjectURL(url);
    }
  };

  img.src = url;
};

document.getElementById('btnOpenFile').onclick = ()=>{
  document.getElementById('fileInput').click();
};
document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    modeEl.value = 'code';
    editorLabel.textContent = 'ซอร์สโค้ด (C / C++ / Java / JavaScript)';
    document.getElementById('btnViewMmd').style.display = 'inline-block';
    document.getElementById('btnOpenFile').style.display = 'inline-block';
    buildSamples();
    codeEl.value = String(reader.result || '');
    render();
    setStatus(true, 'โหลดไฟล์ ' + file.name + ' แล้ว');
  };
  reader.onerror = ()=>{
    alert('ไม่สามารถอ่านไฟล์นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ข้อความ (.c/.cpp/.java/.js)');
  };
  reader.readAsText(file);
  e.target.value = ''; // allow re-selecting the same file later
});

document.getElementById('btnViewMmd').onclick = ()=>{
  if(!lastGeneratedMermaid){ alert('ยังไม่มีโค้ด Mermaid ที่แปลงได้ กด "แปลงเป็นภาพ" ก่อน'); return; }
  mmdOutput.textContent = lastGeneratedMermaid;
  mmdDrawer.classList.add('open');
};
document.getElementById('btnCloseMmd').onclick = ()=> mmdDrawer.classList.remove('open');
document.getElementById('btnCopyMmd').onclick = ()=>{
  if(!lastGeneratedMermaid) return;
  navigator.clipboard.writeText(lastGeneratedMermaid);
};
document.getElementById('btnUseMmd').onclick = ()=>{
  if(!lastGeneratedMermaid) return;
  modeEl.value = 'mermaid';
  editorLabel.textContent = 'โค้ด Mermaid';
  document.getElementById('btnViewMmd').style.display = 'none';
  codeEl.value = lastGeneratedMermaid;
  buildSamples();
  mmdDrawer.classList.remove('open');
  render();
};

codeEl.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){ e.preventDefault(); render(); }
});

document.getElementById('btnViewMmd').style.display = 'none';
document.getElementById('btnOpenFile').style.display = 'none';
buildSamples();
codeEl.value = MERMAID_DEFAULT;
render();
