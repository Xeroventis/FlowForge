<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>โค้ด → โฟลว์ชาร์ต</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<style>
  :root{
    --bg: #0b1220;
    --panel: #111a2e;
    --panel-2: #0e1626;
    --line: #24314d;
    --text: #e7ecf6;
    --dim: #8b98b8;
    --accent: #5fa8ff;
    --accent-2: #ffb454;
    --good: #4ade80;
    --bad: #f87171;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: "Inter", -apple-system, "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  .app{display:flex;flex-direction:column;height:100vh;}

  /* top bar */
  .topbar{
    display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap;
    background:var(--panel-2);border-bottom:1px solid var(--line);
  }
  .brand{font-weight:700;font-size:14px;letter-spacing:.3px;display:flex;align-items:center;gap:8px;margin-right:4px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .topbar .spacer{flex:1;}
  .divider{width:1px;height:22px;background:var(--line);margin:0 4px;}
  select, .btn{
    background:var(--panel);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#081020;border-color:var(--accent);font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);color:#081020;}
  .btn.active{border-color:var(--accent-2);color:var(--accent-2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* main split */
  .main{flex:1;display:flex;min-height:0;}
  .pane{display:flex;flex-direction:column;min-width:0;}
  .editor-pane{width:42%;min-width:320px;border-right:1px solid var(--line);background:var(--panel-2);}
  .preview-pane{flex:1;position:relative;background:
      radial-gradient(circle at 1px 1px, #1a2540 1px, transparent 1px) 0 0/22px 22px, var(--bg);}

  .pane-head{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--dim);
    text-transform:uppercase;letter-spacing:.6px;font-weight:600;
  }
  .pane-head .status{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:none;letter-spacing:0;}
  .pane-head .status .led{width:7px;height:7px;border-radius:50%;background:var(--good);}
  .pane-head .status.err .led{background:var(--bad);}

  textarea{
    flex:1;resize:none;border:none;outline:none;background:transparent;color:var(--text);
    font-family:var(--mono);font-size:13.5px;line-height:1.65;padding:16px;tab-size:2;
  }
  textarea::placeholder{color:#4a577a;}

  .samples{
    display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--line);
  }
  .chip{
    background:var(--panel);border:1px solid var(--line);color:var(--dim);
    padding:5px 10px;border-radius:999px;font-size:11.5px;cursor:pointer;
  }
  .chip:hover{border-color:var(--accent-2);color:var(--accent-2);}

  #diagramHost{
    position:absolute;inset:0;overflow:hidden;
  }
  .center-wrap{
    height:100%;width:100%;display:flex;align-items:center;justify-content:center;
    box-sizing:border-box;
  }
  #diagramHost svg{max-width:none !important;}
  .transform-wrap{display:inline-block;transform-origin:center center;will-change:transform;}
  .transform-wrap svg{display:block;}

  #diagramHost.hand-mode{cursor:grab;}
  #diagramHost.hand-mode.panning{cursor:grabbing;user-select:none;}
  #diagramHost.hand-mode.panning *{user-select:none;}

  .zoom-controls button.active{background:var(--accent);color:#081020;}
  .zoom-controls{
    position:absolute;bottom:16px;right:16px;display:flex;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;
  }
  .zoom-controls button{
    width:30px;height:30px;border-radius:7px;border:none;background:transparent;color:var(--text);
    font-size:15px;cursor:pointer;
  }
  .zoom-controls button:hover{background:var(--line);}

  .error-box{
    max-width:560px;background:#2a1414;border:1px solid #7f2d2d;color:#fca5a5;
    border-radius:10px;padding:16px 18px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.6;
  }
  .error-box b{color:#fecaca;font-family:var(--sans);}

  .empty-hint{color:var(--dim);font-size:13px;text-align:center;max-width:300px;}

  /* generated mermaid drawer */
  .mmd-drawer{
    position:absolute;left:0;right:0;bottom:0;max-height:45%;
    background:var(--panel-2);border-top:1px solid var(--accent-2);
    display:flex;flex-direction:column;transform:translateY(100%);transition:transform .18s ease-out;
    box-shadow:0 -8px 24px rgba(0,0,0,.35);
  }
  .mmd-drawer.open{transform:translateY(0);}
  .mmd-drawer-head{
    display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
    border-bottom:1px solid var(--line);font-size:12px;color:var(--accent-2);font-weight:600;
  }
  .mmd-drawer-head .row{display:flex;gap:8px;align-items:center;}
  .mmd-drawer pre{
    margin:0;padding:14px 16px;overflow:auto;font-family:var(--mono);font-size:12.5px;
    color:#cfe0ff;line-height:1.6;white-space:pre-wrap;
  }
  .mini-btn{
    background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:6px;
    padding:3px 9px;font-size:11px;cursor:pointer;
  }
  .mini-btn:hover{color:var(--accent-2);border-color:var(--accent-2);}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media (max-width: 800px){
    .main{flex-direction:column;}
    .editor-pane{width:100%;border-right:none;border-bottom:1px solid var(--line);height:46%;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><span class="dot"></span> โค้ด → โฟลว์ชาร์ต</div>
    <div class="divider"></div>
    <select id="modeSelect">
      <option value="mermaid">โหมด: เขียน Mermaid โดยตรง</option>
      <option value="code">โหมด: แปลงจากซอร์สโค้ด (C/C++/Java/JS)</option>
    </select>
    <select id="direction">
      <option value="TD">บนลงล่าง (TD)</option>
      <option value="LR">ซ้ายไปขวา (LR)</option>
      <option value="BT">ล่างขึ้นบน (BT)</option>
      <option value="RL">ขวาไปซ้าย (RL)</option>
    </select>
    <div class="spacer"></div>
    <button class="btn" id="btnViewMmd">{ } ดูโค้ด Mermaid</button>
    <button class="btn" id="btnSVG">ดาวน์โหลด SVG</button>
    <label class="btn" style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="transparentBg" style="cursor:pointer;">
      พื้นหลังโปร่งใส
    </label>
    <button class="btn" id="btnPNG">ดาวน์โหลด PNG</button>
    <button class="btn primary" id="btnRender">▶ แปลงเป็นภาพ</button>
  </div>

  <div class="main">
    <div class="pane editor-pane">
      <div class="pane-head">
        <span id="editorLabel">โค้ด Mermaid</span>
        <span class="status" id="status"><span class="led"></span><span id="statusText">พร้อมใช้งาน</span></span>
      </div>
      <textarea id="code" spellcheck="false"></textarea>
      <div class="samples" id="samples"></div>
    </div>

    <div class="pane preview-pane">
      <div class="pane-head">
        <span>ตัวอย่างภาพ</span>
        <span id="zoomLabel" style="text-transform:none;letter-spacing:0;">100%</span>
      </div>
      <div id="diagramHost">
        <div class="center-wrap"><div class="empty-hint">เขียนโค้ดทางซ้าย แล้วกด "แปลงเป็นภาพ" เพื่อดูโฟลว์ชาร์ต</div></div>
      </div>
      <div class="zoom-controls">
        <button id="handTool" title="เครื่องมือมือ (ลากเพื่อเลื่อนภาพ)">✋</button>
        <button id="zoomOut" title="ซูมออก">−</button>
        <button id="zoomReset" title="รีเซ็ตซูม">⤢</button>
        <button id="zoomIn" title="ซูมเข้า">+</button>
      </div>
      <div class="mmd-drawer" id="mmdDrawer">
        <div class="mmd-drawer-head">
          <span>โค้ด Mermaid ที่แปลงได้อัตโนมัติ</span>
          <div class="row">
            <button class="mini-btn" id="btnCopyMmd">คัดลอก</button>
            <button class="mini-btn" id="btnUseMmd">แก้ไขต่อในโหมด Mermaid</button>
            <button class="mini-btn" id="btnCloseMmd">ปิด ✕</button>
          </div>
        </div>
        <pre id="mmdOutput"></pre>
      </div>
    </div>
  </div>
</div>

<script>
mermaid.initialize({ startOnLoad:false, theme:'dark', securityLevel:'loose',
  flowchart:{ htmlLabels:false },
  themeVariables:{
    background:'#0b1220', primaryColor:'#111a2e', primaryTextColor:'#e7ecf6',
    primaryBorderColor:'#5fa8ff', lineColor:'#5fa8ff', secondaryColor:'#182238',
    tertiaryColor:'#111a2e', fontFamily:'Inter, sans-serif'
  }});

const codeEl = document.getElementById('code');
const dirEl = document.getElementById('direction');
const modeEl = document.getElementById('modeSelect');
const host = document.getElementById('diagramHost');
const statusWrap = document.getElementById('status');
const statusText = document.getElementById('statusText');
const zoomLabel = document.getElementById('zoomLabel');
const editorLabel = document.getElementById('editorLabel');
const mmdDrawer = document.getElementById('mmdDrawer');
const mmdOutput = document.getElementById('mmdOutput');

let scale = 1;
let panX = 0;
let panY = 0;
let renderCounter = 0;
let lastGoodSVG = null;
let lastGeneratedMermaid = null;

/* ---------------------------------------------------------------
   SAMPLE LIBRARIES
--------------------------------------------------------------- */
const MERMAID_DEFAULT =
`flowchart TD
    A[คริสต์มาส] -->|หาเงิน| B(ไปช้อปปิ้ง)
    B --> C{คิดดูก่อน}
    C -->|หนึ่ง| D[แล็ปท็อป]
    C -->|สอง| E[ไอโฟน]
    C -->|สาม| F[รถยนต์]`;

const MERMAID_SAMPLES = {
  "Flowchart": MERMAID_DEFAULT,
  "การตัดสินใจ": `flowchart LR
    Start([เริ่มต้น]) --> Q{อากาศดีไหม?}
    Q -->|ดี| A[ไปเดินเล่น]
    Q -->|ไม่ดี| B[อยู่บ้านอ่านหนังสือ]
    A --> End([จบ])
    B --> End`,
  "กระบวนการทำงาน": `flowchart TD
    A[รับคำสั่งซื้อ] --> B[ตรวจสอบสต็อก]
    B --> C{มีสินค้าไหม?}
    C -->|มี| D[แพ็กสินค้า]
    C -->|ไม่มี| E[แจ้งลูกค้า]
    D --> F[จัดส่ง]
    E --> G[สิ้นสุด]
    F --> G`,
  "Sequence": `sequenceDiagram
    participant U as ผู้ใช้
    participant S as เซิร์ฟเวอร์
    U->>S: ส่งคำขอเข้าสู่ระบบ
    S-->>U: ตอบกลับผลลัพธ์
    U->>S: ขอข้อมูลโปรไฟล์
    S-->>U: ส่งข้อมูลโปรไฟล์`,
  "Class": `classDiagram
    class สัตว์ {
      +String ชื่อ
      +ร้อง()
    }
    class แมว {
      +ข่วน()
    }
    สัตว์ <|-- แมว`,
  "Mindmap": `mindmap
  root((แผนงาน))
    วิจัย
      สำรวจตลาด
      คู่แข่ง
    พัฒนา
      ออกแบบ
      สร้างต้นแบบ
    เปิดตัว
      การตลาด
      ขาย`
};

const CODE_SAMPLES = {
  "C++ คำนวณเกรด": `#include <iostream>
using namespace std;

int main() {
    string name;
    float score;
    char grade;

    cout << "===== Grade Calculator =====" << endl;
    cout << "Enter student name: ";
    cin >> name;
    cout << "Enter score (0-100): ";
    cin >> score;

    if (score >= 80) {
        grade = 'A';
    } else if (score >= 70) {
        grade = 'B';
    } else if (score >= 60) {
        grade = 'C';
    } else if (score >= 50) {
        grade = 'D';
    } else {
        grade = 'F';
    }

    cout << "\\nStudent : " << name << endl;
    cout << "Score   : " << score << endl;
    cout << "Grade   : " << grade << endl;

    return 0;
}`,
  "C++ ลูป for": `#include <iostream>
using namespace std;

int main() {
    int n;
    int sum = 0;
    cout << "Enter n: ";
    cin >> n;

    for (int i = 1; i <= n; i++) {
        sum = sum + i;
    }

    cout << "Sum = " << sum << endl;
    return 0;
}`,
  "Java if-else": `public class Main {
    public static void main(String[] args) {
        int age = 20;
        if (age >= 18) {
            System.out.println("Adult");
        } else {
            System.out.println("Minor");
        }
    }
}`,
  "JavaScript while": `function main() {
    let i = 0;
    let total = 0;
    while (i < 5) {
        total = total + i;
        i = i + 1;
    }
    console.log(total);
}`
};

function buildSamples(){
  const wrap = document.getElementById('samples');
  wrap.innerHTML = '';
  const lib = modeEl.value === 'code' ? CODE_SAMPLES : MERMAID_SAMPLES;
  Object.keys(lib).forEach(name=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = name;
    chip.onclick = ()=>{ codeEl.value = lib[name]; render(); };
    wrap.appendChild(chip);
  });
}

function setStatus(ok, msg){
  statusWrap.classList.toggle('err', !ok);
  statusText.textContent = msg;
}

/* ---------------------------------------------------------------
   MODE SWITCH
--------------------------------------------------------------- */
modeEl.addEventListener('change', ()=>{
  const isCode = modeEl.value === 'code';
  editorLabel.textContent = isCode ? 'ซอร์สโค้ด (C / C++ / Java / JavaScript)' : 'โค้ด Mermaid';
  document.getElementById('btnViewMmd').style.display = isCode ? 'inline-block' : 'none';
  buildSamples();
  if(isCode && !codeEl.value.trim()){
    codeEl.value = CODE_SAMPLES["C++ คำนวณเกรด"];
  } else if(!isCode && !codeEl.value.trim()){
    codeEl.value = MERMAID_DEFAULT;
  }
  render();
});

/* ---------------------------------------------------------------
   CODE -> MERMAID CONVERTER (heuristic parser for C-like languages)
--------------------------------------------------------------- */
let nodeCounter = 0;
let nodeDefs = [];
let edgeDefs = [];

function sanitizeLabel(text){
  if(!text) return ' ';
  let t = String(text).replace(/"/g, "'").replace(/\s+/g,' ').trim();
  if(t.length > 70) t = t.slice(0,67) + '...';
  return t || ' ';
}

function newNode(shape, text){
  const id = 'n' + (nodeCounter++);
  const label = sanitizeLabel(text);
  let def;
  if(shape === 'start' || shape === 'end') def = `${id}(["${label}"])`;
  else if(shape === 'decision') def = `${id}{"${label}"}`;
  else if(shape === 'input') def = `${id}[/"${label}"/]`;
  else if(shape === 'output') def = `${id}[\\"${label}"\\]`;
  else def = `${id}["${label}"]`;
  nodeDefs.push(def);
  return id;
}

function connect(exits, targetId){
  for(const e of exits){
    edgeDefs.push(`${e.from} -->${e.label ? '|' + sanitizeLabel(e.label) + '|' : ''} ${targetId}`);
  }
}

function maskLiterals(src){
  const re = new RegExp('"(?:\\\\.|[^"\\\\])*"' + "|'(?:\\\\.|[^'\\\\])*'", 'g');
  return src.replace(re, m => '"' + '_'.repeat(Math.max(0, m.length-2)) + '"');
}

function extractMainBody(origSrc, maskedSrc){
  let braceIdx;
  const mm = maskedSrc.match(/\bmain\s*\([^)]*\)\s*\{/);
  if(mm){
    braceIdx = mm.index + mm[0].length - 1;
  } else {
    const m2 = maskedSrc.match(/\b[\w:<>,\s\*&]+?\s+\w+\s*\([^)]*\)\s*\{/);
    if(m2) braceIdx = m2.index + m2[0].length - 1;
  }
  if(braceIdx === undefined){
    return { orig: origSrc, masked: maskedSrc };
  }
  let depth = 1, j = braceIdx + 1;
  while(j < maskedSrc.length){
    if(maskedSrc[j] === '{') depth++;
    else if(maskedSrc[j] === '}'){ depth--; if(depth === 0) break; }
    j++;
  }
  return { orig: origSrc.slice(braceIdx+1, j), masked: maskedSrc.slice(braceIdx+1, j) };
}

function classifyGeneric(text){
  if(/^\s*(cin|scanf)\b/.test(text)) return { type:'input', text };
  if(/^\s*(cout|printf|print|System\.out\.print(ln)?|console\.log)\b/.test(text)) return { type:'output', text };
  return { type:'simple', text };
}

function extractOutputLabel(text){
  let t = text.replace(/;\s*$/, '');
  if(/^\s*cout/.test(t)){
    const rest = t.replace(/^\s*cout\s*/, '');
    const parts = rest.split('<<').map(p=>p.trim()).filter(Boolean);
    const out = [];
    for(const p of parts){
      if(p === 'endl' || p === 'std::endl') continue;
      const sm = p.match(/^"([\s\S]*)"$/);
      if(sm) out.push(sm[1].replace(/\\n/g,' ').replace(/\\t/g,' '));
      else out.push('{' + p + '}');
    }
    return out.join('').trim() || 'แสดงผล';
  }
  const pm = t.match(/\(([\s\S]*)\)\s*$/);
  if(pm){
    return pm[1].split(/[+,]/).map(s=>{
      const sm = s.trim().match(/^"([\s\S]*)"$/);
      return sm ? sm[1] : '{' + s.trim() + '}';
    }).join(' ').trim() || 'แสดงผล';
  }
  return t;
}

function extractInputLabel(text){
  let t = text.replace(/;\s*$/, '');
  if(/^\s*cin/.test(t)){
    const parts = t.replace(/^\s*cin\s*/, '').split('>>').map(p=>p.trim()).filter(Boolean);
    return 'รับค่า: ' + parts.join(', ');
  }
  const m = t.match(/scanf\s*\(([\s\S]*)\)/);
  if(m){
    const args = m[1].split(',').map(s=>s.trim());
    return 'รับค่า: ' + args.slice(1).join(', ').replace(/&/g,'');
  }
  return t;
}

function parseStatements(orig, masked){
  let i = 0;
  const n = masked.length;
  const stmts = [];

  function skipWs(){ while(i < n && /\s/.test(masked[i])) i++; }
  function matchKeyword(kw){ skipWs(); return new RegExp('^' + kw + '\\b').test(masked.slice(i)); }
  function findMatching(openCh, closeCh, start){
    let depth = 1, j = start + 1;
    while(j < n){
      if(masked[j] === openCh) depth++;
      else if(masked[j] === closeCh){ depth--; if(depth === 0) return j; }
      j++;
    }
    return n - 1;
  }
  function readParenGroup(){
    skipWs();
    const start = i;
    const end = findMatching('(', ')', i);
    const content = orig.slice(start+1, end);
    i = end + 1;
    return content.trim();
  }
  function readBlockOrSingle(){
    skipWs();
    if(masked[i] === '{'){
      const start = i, end = findMatching('{', '}', i);
      const io = orig.slice(start+1, end), im = masked.slice(start+1, end);
      i = end + 1;
      return parseStatements(io, im);
    }
    const s = readSingleStatement();
    return s ? [s] : [];
  }
  function skipToSemi(){
    let depth = 0;
    while(i < n){
      const c = masked[i];
      if(c === '(' || c === '[') depth++;
      else if(c === ')' || c === ']') depth--;
      else if(c === ';' && depth <= 0){ i++; break; }
      i++;
    }
  }
  function readGenericStatement(){
    const start = i;
    let depth = 0;
    while(i < n){
      const c = masked[i];
      if(c === '(' || c === '[') depth++;
      else if(c === ')' || c === ']') depth--;
      else if(c === ';' && depth <= 0) break;
      else if(c === '{' && depth <= 0) break;
      i++;
    }
    const text = orig.slice(start, i).trim();
    if(masked[i] === ';') i++;
    if(!text) return null;
    return classifyGeneric(text);
  }
  function readIf(){
    i += 2;
    const cond = readParenGroup();
    const thenBody = readBlockOrSingle();
    skipWs();
    let elseBody = null;
    if(matchKeyword('else')){
      i += 4; skipWs();
      elseBody = matchKeyword('if') ? [readIf()] : readBlockOrSingle();
    }
    return { type:'if', cond, thenBody, elseBody };
  }
  function readWhile(){
    i += 5;
    const cond = readParenGroup();
    const body = readBlockOrSingle();
    return { type:'while', cond, body };
  }
  function readDoWhile(){
    i += 2;
    const body = readBlockOrSingle();
    skipWs();
    if(matchKeyword('while')) i += 5;
    const cond = readParenGroup();
    skipWs();
    if(masked[i] === ';') i++;
    return { type:'dowhile', cond, body };
  }
  function splitForParts(maskedInner, origInner){
    let depth = 0; const idxs = [];
    for(let k=0;k<maskedInner.length;k++){
      const c = maskedInner[k];
      if(c==='('||c==='[') depth++;
      else if(c===')'||c===']') depth--;
      else if(c===';' && depth===0) idxs.push(k);
    }
    if(idxs.length < 2) return { init:'', cond: origInner.trim(), incr:'' };
    return {
      init: origInner.slice(0, idxs[0]).trim(),
      cond: origInner.slice(idxs[0]+1, idxs[1]).trim(),
      incr: origInner.slice(idxs[1]+1).trim()
    };
  }
  function readFor(){
    i += 3; skipWs();
    const start = i, end = findMatching('(', ')', i);
    const innerOrig = orig.slice(start+1, end), innerMasked = masked.slice(start+1, end);
    i = end + 1;
    const parts = splitForParts(innerMasked, innerOrig);
    const body = readBlockOrSingle();
    return { type:'for', init:parts.init, cond:parts.cond, incr:parts.incr, body };
  }
  function parseCases(orig2, masked2){
    const cases = [];
    const re = /\b(case\s+[^:]+|default)\s*:/g;
    const matches = []; let m;
    while((m = re.exec(masked2))) matches.push({ index:m.index, end:re.lastIndex, text:m[1] });
    for(let k=0;k<matches.length;k++){
      const bodyStart = matches[k].end;
      const bodyEnd = k+1 < matches.length ? matches[k+1].index : masked2.length;
      const label = orig2.slice(matches[k].index, matches[k].end-1).trim();
      cases.push({
        label,
        body: parseStatements(orig2.slice(bodyStart, bodyEnd), masked2.slice(bodyStart, bodyEnd))
      });
    }
    return cases;
  }
  function readSwitch(){
    i += 6;
    const expr = readParenGroup();
    skipWs();
    const start = i, end = findMatching('{', '}', i);
    const cases = parseCases(orig.slice(start+1, end), masked.slice(start+1, end));
    i = end + 1;
    return { type:'switch', expr, cases };
  }
  function readReturn(){
    i += 6; // consume 'return'
    skipWs();
    const start = i;
    skipToSemi();
    const text = orig.slice(start, Math.max(start, i-1)).trim();
    return { type:'return', text };
  }
  function readSingleStatement(){
    skipWs();
    if(i >= n) return null;
    if(matchKeyword('if')) return readIf();
    if(matchKeyword('while')) return readWhile();
    if(matchKeyword('for')) return readFor();
    if(matchKeyword('do')) return readDoWhile();
    if(matchKeyword('switch')) return readSwitch();
    if(matchKeyword('return')) return readReturn();
    if(matchKeyword('break')){ skipToSemi(); return { type:'break' }; }
    if(matchKeyword('continue')){ skipToSemi(); return { type:'continue' }; }
    if(masked[i] === '{'){
      const start = i, end = findMatching('{', '}', i);
      const io = orig.slice(start+1,end), im = masked.slice(start+1,end);
      i = end + 1;
      return { type:'block', body: parseStatements(io, im) };
    }
    return readGenericStatement();
  }

  while(true){
    skipWs();
    if(i >= n) break;
    const before = i;
    const s = readSingleStatement();
    if(!s){ if(i === before) break; else continue; }
    if(s.type === 'block') stmts.push(...s.body);
    else stmts.push(s);
    if(i === before) break; // safety against infinite loop
  }
  return stmts;
}

function processStatements(stmts, entryExits){
  let exits = entryExits;
  for(const stmt of stmts){
    if(!exits.length) break; // dead code after return/etc — stop routing
    exits = processStatement(stmt, exits);
  }
  return exits;
}

function processStatement(stmt, entryExits){
  switch(stmt.type){
    case 'simple': {
      const id = newNode('process', stmt.text.replace(/;\s*$/, ''));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'input': {
      const id = newNode('input', extractInputLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'output': {
      const id = newNode('output', extractOutputLabel(stmt.text));
      connect(entryExits, id);
      return [{ from:id }];
    }
    case 'if': {
      const id = newNode('decision', stmt.cond);
      connect(entryExits, id);
      const thenExits = processStatements(stmt.thenBody, [{ from:id, label:'ใช่' }]);
      const elseExits = stmt.elseBody
        ? processStatements(stmt.elseBody, [{ from:id, label:'ไม่' }])
        : [{ from:id, label:'ไม่' }];
      return thenExits.concat(elseExits);
    }
    case 'while': {
      const id = newNode('decision', stmt.cond);
      connect(entryExits, id);
      const bodyExits = processStatements(stmt.body, [{ from:id, label:'ใช่' }]);
      connect(bodyExits, id);
      return [{ from:id, label:'ไม่' }];
    }
    case 'dowhile': {
      const startId = newNode('process', 'เริ่มลูป');
      connect(entryExits, startId);
      const bodyExits = processStatements(stmt.body, [{ from:startId }]);
      const condId = newNode('decision', stmt.cond);
      connect(bodyExits, condId);
      connect([{ from:condId, label:'ใช่' }], startId);
      return [{ from:condId, label:'ไม่' }];
    }
    case 'for': {
      let exits = entryExits;
      if(stmt.init){
        const initId = newNode('process', stmt.init);
        connect(exits, initId);
        exits = [{ from:initId }];
      }
      const condId = newNode('decision', stmt.cond || 'true');
      connect(exits, condId);
      let bodyExits = processStatements(stmt.body, [{ from:condId, label:'ใช่' }]);
      if(stmt.incr && bodyExits.length){
        const incrId = newNode('process', stmt.incr);
        connect(bodyExits, incrId);
        bodyExits = [{ from:incrId }];
      }
      connect(bodyExits, condId);
      return [{ from:condId, label:'ไม่' }];
    }
    case 'switch': {
      const id = newNode('decision', stmt.expr);
      connect(entryExits, id);
      let allExits = [];
      for(const c of stmt.cases){
        const bodyExits = processStatements(c.body, [{ from:id, label:c.label }]);
        allExits.push(...bodyExits);
      }
      return allExits;
    }
    case 'return': {
      const id = newNode('end', stmt.text ? ('return ' + stmt.text) : 'return');
      connect(entryExits, id);
      return [];
    }
    case 'break': case 'continue': {
      const id = newNode('process', stmt.type);
      connect(entryExits, id);
      return [{ from:id }];
    }
    default:
      return entryExits;
  }
}

function convertCodeToMermaid(src){
  nodeCounter = 0; nodeDefs = []; edgeDefs = [];
  let s = src.replace(/\/\*[\s\S]*?\*\//g, m => ' '.repeat(m.length));
  s = s.replace(/\/\/.*$/gm, m => ' '.repeat(m.length));
  s = s.replace(/^\s*#.*$/gm, '');
  s = s.replace(/^\s*using\s+namespace\s+\w+\s*;\s*$/gm, '');
  s = s.replace(/^\s*(import|package)\s+[^\n]*$/gm, '');

  const masked = maskLiterals(s);
  const body = extractMainBody(s, masked);
  const stmts = parseStatements(body.orig, body.masked);

  if(!stmts.length){
    throw new Error('ไม่พบคำสั่งที่แปลงเป็นผังงานได้ ลองตรวจสอบว่าโค้ดมีฟังก์ชัน main() หรือมีคำสั่งอยู่จริง');
  }

  const startId = newNode('start', 'เริ่มต้น');
  let exits = processStatements(stmts, [{ from:startId }]);
  if(exits.length){
    const endId = newNode('end', 'จบ');
    connect(exits, endId);
  }

  const lines = ['flowchart TD'];
  nodeDefs.forEach(d => lines.push('    ' + d));
  edgeDefs.forEach(e => lines.push('    ' + e));
  return lines.join('\n');
}

/* ---------------------------------------------------------------
   RENDERING
--------------------------------------------------------------- */
function applyDirectionIfFlowchart(src){
  const dir = dirEl.value;
  const trimmed = src.trim();
  const m = trimmed.match(/^(flowchart|graph)\s+(TD|TB|LR|RL|BT)/i);
  if(m) return trimmed.replace(/^(flowchart|graph)\s+(TD|TB|LR|RL|BT)/i, `$1 ${dir}`);
  return src;
}

async function render(){
  const raw = codeEl.value.trim();
  if(!raw){
    host.innerHTML = '<div class="center-wrap"><div class="empty-hint">เขียนโค้ดทางซ้าย แล้วกด "แปลงเป็นภาพ" เพื่อดูโฟลว์ชาร์ต</div></div>';
    setStatus(true, 'พร้อมใช้งาน');
    lastGeneratedMermaid = null;
    return;
  }

  let mermaidSrc;
  if(modeEl.value === 'code'){
    try{
      mermaidSrc = convertCodeToMermaid(raw);
      lastGeneratedMermaid = mermaidSrc;
    }catch(err){
      const msg = (err && err.message) ? err.message : String(err);
      host.innerHTML = `<div class="center-wrap"><div class="error-box"><b>แปลงซอร์สโค้ดไม่สำเร็จ</b>\n\n${msg}</div></div>`;
      setStatus(false, 'แปลงโค้ดไม่สำเร็จ');
      return;
    }
  } else {
    mermaidSrc = raw;
    lastGeneratedMermaid = null;
  }

  const src = applyDirectionIfFlowchart(mermaidSrc);
  const id = 'mmd-' + (renderCounter++);
  try{
    const { svg } = await mermaid.render(id, src);
    lastGoodSVG = svg;
    host.innerHTML = `<div class="center-wrap"><div class="transform-wrap" id="tw">${svg}</div></div>`;
    setStatus(true, 'แปลงสำเร็จ');
    if(mmdOutput) mmdOutput.textContent = lastGeneratedMermaid || '';

    // Measure natural size, then auto-fit large diagrams so nothing starts off-screen.
    requestAnimationFrame(()=>{
      const svgEl = document.querySelector('#tw svg');
      if(svgEl){
        const svgBox = svgEl.getBoundingClientRect();
        naturalW = svgBox.width;
        naturalH = svgBox.height;
        const hostBox = host.getBoundingClientRect();
        const fitScale = Math.min(
          (hostBox.width - 64) / naturalW,
          (hostBox.height - 64) / naturalH
        );
        scale = (isFinite(fitScale) && fitScale < 1) ? Math.max(0.2, fitScale) : 1;
      }
      panX = 0; panY = 0;
      applyZoom();
    });
  }catch(err){
    const msg = (err && err.message) ? err.message : String(err);
    host.innerHTML = `<div class="center-wrap"><div class="error-box"><b>สร้างผังงานไม่สำเร็จ</b>\n\n${msg}</div></div>`;
    setStatus(false, 'พบข้อผิดพลาด');
    document.querySelectorAll('body > svg[id^="mmd-"]').forEach(n => n.remove());
  }
}

let naturalW = null;
let naturalH = null;

function applyZoom(){
  const tw = document.getElementById('tw');
  if(tw){
    tw.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }
  zoomLabel.textContent = Math.round(scale*100) + '%';
}

document.getElementById('btnRender').onclick = render;
dirEl.onchange = render;
document.getElementById('zoomIn').onclick = ()=>{ scale = Math.min(scale+0.15, 3); applyZoom(); };
document.getElementById('zoomOut').onclick = ()=>{ scale = Math.max(scale-0.15, 0.25); applyZoom(); };
document.getElementById('zoomReset').onclick = ()=>{ scale = 1; panX = 0; panY = 0; applyZoom(); };

/* ---------------------------------------------------------------
   HAND TOOL (click-and-drag panning)
--------------------------------------------------------------- */
const handBtn = document.getElementById('handTool');
let handToolOn = false;
let isPanning = false;
let panStartX = 0, panStartY = 0, scrollStartX = 0, scrollStartY = 0;

handBtn.onclick = ()=>{
  handToolOn = !handToolOn;
  handBtn.classList.toggle('active', handToolOn);
  host.classList.toggle('hand-mode', handToolOn);
};

host.addEventListener('mousedown', (e)=>{
  if(!handToolOn) return;
  isPanning = true;
  host.classList.add('panning');
  panStartX = e.clientX; panStartY = e.clientY;
  scrollStartX = panX; scrollStartY = panY;
  e.preventDefault();
});
window.addEventListener('mousemove', (e)=>{
  if(!isPanning) return;
  panX = scrollStartX + (e.clientX - panStartX);
  panY = scrollStartY + (e.clientY - panStartY);
  applyZoom();
});
window.addEventListener('mouseup', ()=>{
  if(isPanning){ isPanning = false; host.classList.remove('panning'); }
});

host.addEventListener('touchstart', (e)=>{
  if(!handToolOn || e.touches.length !== 1) return;
  isPanning = true;
  host.classList.add('panning');
  panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
  scrollStartX = panX; scrollStartY = panY;
}, { passive:true });
host.addEventListener('touchmove', (e)=>{
  if(!isPanning || e.touches.length !== 1) return;
  panX = scrollStartX + (e.touches[0].clientX - panStartX);
  panY = scrollStartY + (e.touches[0].clientY - panStartY);
  applyZoom();
}, { passive:true });
host.addEventListener('touchend', ()=>{
  isPanning = false;
  host.classList.remove('panning');
});

/* Mouse-wheel zoom, centered on the cursor position */
host.addEventListener('wheel', (e)=>{
  if(!document.querySelector('#tw svg')) return;
  e.preventDefault();

  const hostBox = host.getBoundingClientRect();
  const mx = e.clientX - (hostBox.left + hostBox.width / 2);
  const my = e.clientY - (hostBox.top + hostBox.height / 2);

  const oldScale = scale;
  const zoomStep = 1.1;
  const newScale = e.deltaY < 0
    ? Math.min(scale * zoomStep, 3)
    : Math.max(scale / zoomStep, 0.25);

  if(newScale === oldScale) return;

  // Keep the point currently under the cursor fixed on screen while zooming.
  panX = mx - (newScale / oldScale) * (mx - panX);
  panY = my - (newScale / oldScale) * (my - panY);
  scale = newScale;
  applyZoom();
}, { passive:false });

document.getElementById('btnSVG').onclick = ()=>{
  if(!lastGoodSVG){ alert('กรุณาแปลงโค้ดเป็นภาพก่อน'); return; }
  const blob = new Blob([lastGoodSVG], { type:'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flowchart.svg'; a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('btnPNG').onclick = ()=>{
  if(!lastGoodSVG){ alert('กรุณาแปลงโค้ดเป็นภาพก่อน'); return; }

  // ใช้ SVG node ที่ render อยู่จริงในหน้า (ผ่าน HTML parser ซึ่งรองรับ entity ของ mermaid ได้กว้างกว่า)
  // แทนการ parse string ด้วย DOMParser แบบ XML เข้มงวด ที่อาจ error กับบาง entity แล้วโหลดภาพไม่ได้
  const liveSvg = document.querySelector('#tw svg');
  if(!liveSvg){
    alert('ไม่พบภาพผังงานในขณะนี้ กรุณาแปลงเป็นภาพก่อน');
    return;
  }

  const svgClone = liveSvg.cloneNode(true);
  let w = 0, h = 0;

  const wAttr = parseFloat(svgClone.getAttribute('width'));
  const hAttr = parseFloat(svgClone.getAttribute('height'));
  const viewBox = svgClone.getAttribute('viewBox');

  if(wAttr && hAttr && !isNaN(wAttr) && !isNaN(hAttr)){
    w = wAttr; h = hAttr;
  } else if(viewBox){
    const parts = viewBox.trim().split(/\s+/).map(Number);
    if(parts.length === 4 && parts[2] && parts[3]){ w = parts[2]; h = parts[3]; }
  }
  if((!w || !h) && naturalW && naturalH){
    w = naturalW; h = naturalH;
  }
  if(!w || !h){ w = 1200; h = 800; }

  svgClone.setAttribute('width', String(w));
  svgClone.setAttribute('height', String(h));
  svgClone.style.width = '';
  svgClone.style.height = '';
  if(!svgClone.getAttribute('xmlns')) svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

  const svgMarkup = new XMLSerializer().serializeToString(svgClone);
  const svgBlob = new Blob([svgMarkup], { type:'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();

  img.onerror = ()=>{
    URL.revokeObjectURL(url);
    alert('ไม่สามารถสร้างไฟล์ PNG ได้ ลองใช้ปุ่ม "ดาวน์โหลด SVG" แทน หรือแปลงเป็นภาพใหม่อีกครั้ง');
  };

  img.onload = ()=>{
    try{
      const scaleFactor = 2;
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(w * scaleFactor));
      canvas.height = Math.max(1, Math.round(h * scaleFactor));
      const ctx = canvas.getContext('2d');
      const wantTransparent = document.getElementById('transparentBg').checked;
      if(!wantTransparent){
        ctx.fillStyle = '#0b1220';
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
      ctx.scale(scaleFactor, scaleFactor);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob=>{
        if(!blob){
          alert('ไม่สามารถสร้างไฟล์ PNG ได้ ลองใช้ปุ่ม "ดาวน์โหลด SVG" แทน');
          return;
        }
        const pngUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = pngUrl; a.download = 'flowchart.png'; a.click();
        URL.revokeObjectURL(pngUrl);
      }, 'image/png');
    } catch(err){
      alert('เกิดข้อผิดพลาดขณะสร้าง PNG: ' + (err && err.message ? err.message : String(err)));
    } finally {
      URL.revokeObjectURL(url);
    }
  };

  img.src = url;
};

document.getElementById('btnViewMmd').onclick = ()=>{
  if(!lastGeneratedMermaid){ alert('ยังไม่มีโค้ด Mermaid ที่แปลงได้ กด "แปลงเป็นภาพ" ก่อน'); return; }
  mmdOutput.textContent = lastGeneratedMermaid;
  mmdDrawer.classList.add('open');
};
document.getElementById('btnCloseMmd').onclick = ()=> mmdDrawer.classList.remove('open');
document.getElementById('btnCopyMmd').onclick = ()=>{
  if(!lastGeneratedMermaid) return;
  navigator.clipboard.writeText(lastGeneratedMermaid);
};
document.getElementById('btnUseMmd').onclick = ()=>{
  if(!lastGeneratedMermaid) return;
  modeEl.value = 'mermaid';
  editorLabel.textContent = 'โค้ด Mermaid';
  document.getElementById('btnViewMmd').style.display = 'none';
  codeEl.value = lastGeneratedMermaid;
  buildSamples();
  mmdDrawer.classList.remove('open');
  render();
};

codeEl.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){ e.preventDefault(); render(); }
});

document.getElementById('btnViewMmd').style.display = 'none';
buildSamples();
codeEl.value = MERMAID_DEFAULT;
render();
</script>
